<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinkällaren – Pers Kök & Vinkällare</title>
  <style>
    /* Mörkt tema per CLAUDE.md */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 6rem;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-emblem {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 50%;
    }

    .header-titel {
      font-size: 1.05rem;
      font-weight: 700;
      flex: 1;
    }

    .tillbaka {
      color: #888;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.4rem 0.7rem;
      border: 1px solid #333;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .tillbaka:hover { color: #e0e0e0; border-color: #555; }

    /* ── Huvudinnehåll ───────────────────────────────────────────── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1rem;
    }

    /* ── Statistikrad ────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .stat-post {
      text-align: center;
      padding: 0.8rem 0.5rem;
      border-right: 1px solid #2a2a2a;
      font-size: 0.75rem;
      color: #777;
    }

    .stat-post:last-child { border-right: none; }

    .stat-siffra {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0e0e0;
      line-height: 1.25;
    }

    /* ── Filterrad ───────────────────────────────────────────────── */
    .filterrad {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .sok-input {
      flex: 1;
      min-width: 160px;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      outline: none;
    }

    .sok-input::placeholder { color: #555; }
    .sok-input:focus { border-color: #555; }

    .filter-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #999;
      font-size: 0.8rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .filter-btn.aktiv                        { background: #2a2a2a; border-color: #555; color: #e0e0e0; }
    .filter-btn[data-typ="rött"].aktiv       { background: #2a0d14; border-color: #7a1a2a; color: #e07a8a; }
    .filter-btn[data-typ="vitt"].aktiv       { background: #271d08; border-color: #7a5f14; color: #e0c06a; }
    .filter-btn[data-typ="mousserande"].aktiv{ background: #0d2a1a; border-color: #1a7a4a; color: #6ae0a0; }
    .filter-btn[data-typ="rosé"].aktiv       { background: #2a0d1a; border-color: #7a1a3a; color: #e07ab0; }
    .filter-btn[data-typ="sött"].aktiv       { background: #271508; border-color: #7a4a14; color: #e0a06a; }

    .land-select {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #999;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }

    /* ── Vinkort-grid ────────────────────────────────────────────── */
    .viner-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .tomt-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: #555;
    }

    .tomt-ikon { font-size: 3.5rem; margin-bottom: 0.75rem; }

    /* ── Vinkort ─────────────────────────────────────────────────── */
    .vinkort {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .vinkort:hover { border-color: #3a3a3a; }

    .vinkort-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* Typ-badges */
    .typ-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .typ-rott  { background: rgba(122,26,42,0.3);  color: #e07a8a; border: 1px solid #7a1a2a; }
    .typ-vitt  { background: rgba(122,95,20,0.3);  color: #e0c06a; border: 1px solid #7a5f14; }
    .typ-mous  { background: rgba(26,122,74,0.3);  color: #6ae0a0; border: 1px solid #1a7a4a; }
    .typ-rose  { background: rgba(122,26,58,0.3);  color: #e07ab0; border: 1px solid #7a1a3a; }
    .typ-sott  { background: rgba(122,74,20,0.3);  color: #e0a06a; border: 1px solid #7a4a14; }

    .edit-knapp {
      background: none;
      border: none;
      color: #444;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.15rem 0.3rem;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s;
      line-height: 1;
    }

    .edit-knapp:hover { color: #aaa; }

    .vinkort-namn {
      font-size: 0.95rem;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.3;
    }

    .vinkort-meta {
      font-size: 0.78rem;
      color: #888;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
    }

    .hyllplats-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #666;
      background: #252525;
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
    }

    /* Drickfönster */
    .drinkfonstret {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      border-radius: 8px;
      padding: 0.22rem 0.55rem;
    }

    .drink-ok       { color: #555; }
    .drink-snart    { background: rgba(180,130,0,0.14);  color: #e0b040; border: 1px solid rgba(180,130,0,0.3); }
    .drink-passerat { background: rgba(180,50,50,0.14);  color: #e07070; border: 1px solid rgba(180,50,50,0.3); }

    /* Flaskräknare */
    .raknar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.6rem;
      margin-top: 0.2rem;
      border-top: 1px solid #242424;
    }

    .antal-display {
      font-size: 1.4rem;
      font-weight: 700;
      min-width: 2.5rem;
      text-align: center;
    }

    .antal-display.noll { color: #444; }

    .raknar-knapp {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #242424;
      color: #e0e0e0;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
    }

    .raknar-knapp:active { background: #333; }
    .raknar-knapp:disabled { opacity: 0.25; cursor: default; }

    /* ── Export/import ───────────────────────────────────────────── */
    .verktygsrad {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .verktygknapp {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #999;
      font-size: 0.85rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }

    .verktygknapp:hover { background: #252525; color: #e0e0e0; }

    /* ── FAB ─────────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 58px;
      height: 58px;
      border-radius: 17px;
      background: #7a1a2a;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, background 0.12s;
      z-index: 50;
    }

    .fab:hover   { background: #9a2a3a; }
    .fab:active  { transform: scale(0.93); }

    /* ── Modal ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.oppet { opacity: 1; pointer-events: all; }

    .modal {
      background: #1e1e1e;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 2.5rem;
      transform: translateY(100%);
      transition: transform 0.22s ease;
    }

    .modal-overlay.oppet .modal { transform: translateY(0); }

    .modal-rubrik {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-stang {
      background: none;
      border: none;
      color: #555;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }

    .modal-stang:hover { color: #aaa; }

    /* Formulärfält */
    .formrad {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .formrad.hel { grid-template-columns: 1fr; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: #888;
    }

    input, select, textarea {
      background: #282828;
      border: 1px solid #383838;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }

    input:focus, select:focus, textarea:focus { border-color: #7a1a2a; }

    textarea { resize: vertical; min-height: 70px; }

    select option { background: #282828; }

    /* Historik */
    .historik-label {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1rem 0 0.4rem;
    }

    .historik-lista {
      list-style: none;
      font-size: 0.78rem;
      color: #555;
    }

    .historik-lista li {
      display: flex;
      gap: 0.75rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .hist-datum { color: #444; flex-shrink: 0; }

    /* Modalknappar */
    .modal-knappar {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .knapp-spara {
      flex: 1;
      min-width: 100px;
      padding: 0.85rem;
      background: #7a1a2a;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-spara:hover { background: #9a2a3a; }

    .knapp-avbryt {
      padding: 0.85rem 1.25rem;
      background: #252525;
      border: 1px solid #333;
      border-radius: 12px;
      color: #aaa;
      font-size: 0.95rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-slett {
      padding: 0.85rem 1rem;
      background: transparent;
      border: 1px solid #4a1a1a;
      border-radius: 12px;
      color: #9a5050;
      font-size: 0.95rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-slett:hover { background: rgba(90,26,26,0.3); }

    /* ── Etikettmagi ─────────────────────────────────────────────── */
    .etikett-knapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      background: #1c1c2e;
      border: 1px dashed #4a2a5a;
      border-radius: 12px;
      color: #c080e0;
      font-size: 0.95rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .etikett-knapp:hover { background: #25253a; }
    .etikett-knapp:disabled { opacity: 0.5; cursor: default; }

    .etikettmagi-status {
      font-size: 0.82rem;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
      color: #888;
      text-align: center;
    }

    .etikettmagi-status.fel { color: #e05060; }

    /* Analysresultat-kort – visas efter lyckad skanning */
    .etikett-analys {
      display: none;
      background: #1a1a2e;
      border: 1px solid #4a2a5a;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #ccc;
    }

    .etikett-analys.synlig { display: block; }

    .etikett-analys-rubrik {
      font-weight: 700;
      font-size: 0.95rem;
      color: #c080e0;
      margin-bottom: 0.65rem;
    }

    .etikett-analys p { margin-bottom: 0.45rem; }
    .etikett-analys p:last-child { margin-bottom: 0; }

    .analys-etikett {
      display: block;
      font-size: 0.72rem;
      color: #777;
      margin-bottom: 0.1rem;
    }

    /* ── Responsivt ──────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .stat-post:nth-child(2) { border-right: none; }
      .stat-post:nth-child(3),
      .stat-post:nth-child(4) { border-top: 1px solid #2a2a2a; }
      .formrad { grid-template-columns: 1fr; }
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .modal { border-radius: 20px; margin: 1rem; max-height: 85vh; }
    }
  </style>
</head>
<body>

  <header class="header">
    <img src="Logga.png" alt="" class="header-emblem"
         onerror="this.style.display='none'">
    <span class="header-titel">🍷 Vinkällaren</span>
    <a href="hub.html" class="tillbaka">← Startsidan</a>
  </header>

  <div class="container">

    <!-- Statistikrad -->
    <div class="stats">
      <div class="stat-post">
        <span class="stat-siffra" id="stat-flaskor">0</span>flaskor
      </div>
      <div class="stat-post">
        <span class="stat-siffra" id="stat-viner">0</span>viner
      </div>
      <div class="stat-post">
        <span class="stat-siffra" id="stat-aldst">—</span>äldsta årgång
      </div>
      <div class="stat-post">
        <span class="stat-siffra" id="stat-lander">0</span>länder
      </div>
    </div>

    <!-- Filterrad -->
    <div class="filterrad">
      <input type="search" class="sok-input" id="sokruta"
             placeholder="🔍  Sök vin, druva, land…">
      <button class="filter-btn aktiv" data-typ="">Alla</button>
      <button class="filter-btn" data-typ="rött">Rött</button>
      <button class="filter-btn" data-typ="vitt">Vitt</button>
      <button class="filter-btn" data-typ="mousserande">Mousse.</button>
      <button class="filter-btn" data-typ="rosé">Rosé</button>
      <button class="filter-btn" data-typ="sött">Sött</button>
      <select class="land-select" id="land-filter">
        <option value="">Alla länder</option>
      </select>
    </div>

    <!-- Vinkort -->
    <div class="viner-grid" id="viner-grid"></div>

    <!-- Verktyg -->
    <div class="verktygsrad">
      <button class="verktygknapp" id="exportera-btn">↓ Säkerhetskopia</button>
      <label class="verktygknapp">
        ↑ Importera
        <input type="file" accept=".json" id="importera-fil" style="display:none">
      </label>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab" id="lagg-till-fab" title="Lägg till vin">＋</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-rubrik">
        <span id="modal-titel">Lägg till vin</span>
        <button class="modal-stang" id="modal-stang">✕</button>
      </div>

      <form id="vin-form" autocomplete="off">
        <!-- Etikettmagi – dold filinput, kameraknapp och statusrad -->
        <input type="file" accept="image/*" capture="environment" id="etikett-input" style="display:none">
        <button type="button" class="etikett-knapp" id="etikett-knapp">📷 Fota etikett</button>
        <div class="etikettmagi-status" id="etikettmagi-status"></div>
        <div class="etikett-analys" id="etikett-analys"></div>

        <div class="formrad hel">
          <label>Namn *
            <input id="f-namn" type="text" placeholder="t.ex. Barolo del Vecchio Maestro 2018" required>
          </label>
        </div>
        <div class="formrad">
          <label>Typ
            <select id="f-typ">
              <option value="rött">Rött</option>
              <option value="vitt">Vitt</option>
              <option value="mousserande">Mousserande</option>
              <option value="rosé">Rosé</option>
              <option value="sött">Sött</option>
            </select>
          </label>
          <label>Druva
            <input id="f-druva" type="text" placeholder="t.ex. Nebbiolo">
          </label>
        </div>
        <div class="formrad">
          <label>Land
            <input id="f-land" type="text" placeholder="t.ex. Italien">
          </label>
          <label>Region
            <input id="f-region" type="text" placeholder="t.ex. Piemonte">
          </label>
        </div>
        <div class="formrad">
          <label>Årgång
            <input id="f-arsgang" type="number" placeholder="2018" min="1800" max="2100">
          </label>
          <label>Antal flaskor
            <input id="f-antal" type="number" value="1" min="0" max="9999">
          </label>
        </div>
        <div class="formrad">
          <label>Hyllplats
            <input id="f-hyllplats" type="text" placeholder="t.ex. A3">
          </label>
          <div></div>
        </div>
        <div class="formrad">
          <label>Drick från (år)
            <input id="f-drinkfran" type="number" placeholder="2024" min="1800" max="2100">
          </label>
          <label>Drick till (år)
            <input id="f-dricktill" type="number" placeholder="2032" min="1800" max="2100">
          </label>
        </div>
        <div class="formrad hel">
          <label>Anteckningar
            <textarea id="f-anteckningar" placeholder="Smaknoter, pris, köpplats…"></textarea>
          </label>
        </div>

        <div id="historik-sektion" style="display:none">
          <p class="historik-label">Historik</p>
          <ul class="historik-lista" id="historik-lista"></ul>
        </div>

        <div class="modal-knappar">
          <button type="button" class="knapp-slett" id="ta-bort-btn" style="display:none">
            Ta bort
          </button>
          <button type="button" class="knapp-avbryt" id="avbryt-btn">Avbryt</button>
          <button type="submit" class="knapp-spara">Spara</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Datalagring i localStorage med prefix "vinkallare_"
    const LS_NYCKEL = 'vinkallare_viner';
    const AR_NU = new Date().getFullYear();

    let viner = [];
    let filter = { typ: '', land: '', sok: '' };
    let redigerarId = null;

    // ── Data ────────────────────────────────────────────────────────

    function ladda() {
      try { viner = JSON.parse(localStorage.getItem(LS_NYCKEL) || '[]'); }
      catch { viner = []; }
    }

    function spara() {
      localStorage.setItem(LS_NYCKEL, JSON.stringify(viner));
    }

    function nyId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function idag() {
      return new Date().toISOString().slice(0, 10);
    }

    // Returnerar 'snart', 'passerat' eller null baserat på drickfönster
    function drinkStatus(v) {
      if (!v.dricktill) return null;
      const till = parseInt(v.dricktill);
      if (AR_NU > till) return 'passerat';
      if (till - AR_NU <= 2) return 'snart';
      return null;
    }

    // ── Render ──────────────────────────────────────────────────────

    function renderAllt() {
      renderStats();
      renderLandFilter();
      renderGrid();
    }

    function renderStats() {
      const total = viner.reduce((s, v) => s + (v.antal || 0), 0);
      const lander = new Set(viner.filter(v => v.land).map(v => v.land)).size;
      const artal = viner.filter(v => v.arsgang).map(v => v.arsgang);
      document.getElementById('stat-flaskor').textContent = total;
      document.getElementById('stat-viner').textContent = viner.length;
      document.getElementById('stat-aldst').textContent = artal.length ? Math.min(...artal) : '—';
      document.getElementById('stat-lander').textContent = lander;
    }

    function renderLandFilter() {
      const sel = document.getElementById('land-filter');
      const valt = sel.value;
      const lander = [...new Set(viner.filter(v => v.land).map(v => v.land))].sort();
      sel.innerHTML = '<option value="">Alla länder</option>' +
        lander.map(l => `<option value="${h(l)}"${l === valt ? ' selected' : ''}>${h(l)}</option>`).join('');
    }

    function renderGrid() {
      const grid = document.getElementById('viner-grid');
      let lista = viner;

      if (filter.typ) lista = lista.filter(v => v.typ === filter.typ);
      if (filter.land) lista = lista.filter(v => v.land === filter.land);
      if (filter.sok) {
        const s = filter.sok.toLowerCase();
        lista = lista.filter(v =>
          [v.namn, v.druva, v.land, v.region].some(f => (f || '').toLowerCase().includes(s))
        );
      }

      if (lista.length === 0) {
        grid.innerHTML = `<div class="tomt-state">
          <div class="tomt-ikon">🍷</div>
          <p>${viner.length === 0
            ? 'Vinkällaren är tom – tryck ＋ för att lägga till ditt första vin!'
            : 'Inga viner matchar filtret.'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = lista.map(vinkortHtml).join('');

      lista.forEach(v => {
        document.getElementById('plus-' + v.id).addEventListener('click', () => andraAntal(v.id, 1));
        document.getElementById('minus-' + v.id).addEventListener('click', () => andraAntal(v.id, -1));
        document.getElementById('edit-' + v.id).addEventListener('click', () => oppnaRedigera(v.id));
      });
    }

    function vinkortHtml(v) {
      const typKlass  = { rött:'typ-rott', vitt:'typ-vitt', mousserande:'typ-mous', rosé:'typ-rose', sött:'typ-sott' };
      const typLabel  = { rött:'Rött', vitt:'Vitt', mousserande:'Mousserande', rosé:'Rosé', sött:'Sött' };
      const ds = drinkStatus(v);

      // Metarad: druva · land·region · årgång
      const meta = [
        v.druva,
        [v.land, v.region].filter(Boolean).join(' · '),
        v.arsgang ? String(v.arsgang) : ''
      ].filter(Boolean).map(s => `<span>${h(s)}</span>`).join('');

      // Drickfönster-badge
      let drinkBadge = '';
      if (v.drinkfran || v.dricktill) {
        const span = (v.drinkfran || '?') + '–' + (v.dricktill || '?');
        if (ds === 'passerat')
          drinkBadge = `<span class="drinkfonstret drink-passerat">⚠ Passerat fönster ${span}</span>`;
        else if (ds === 'snart')
          drinkBadge = `<span class="drinkfonstret drink-snart">⏳ Drick snart ${span}</span>`;
        else
          drinkBadge = `<span class="drinkfonstret drink-ok">🍷 ${span}</span>`;
      }

      return `<div class="vinkort">
        <div class="vinkort-header">
          <span class="typ-badge ${typKlass[v.typ] || 'typ-rott'}">${typLabel[v.typ] || h(v.typ)}</span>
          <button class="edit-knapp" id="edit-${v.id}" title="Redigera">✎</button>
        </div>
        <div class="vinkort-namn">${h(v.namn)}</div>
        ${meta ? `<div class="vinkort-meta">${meta}</div>` : ''}
        ${v.hyllplats ? `<div class="hyllplats-tag">📍 ${h(v.hyllplats)}</div>` : ''}
        ${drinkBadge}
        <div class="raknar">
          <button class="raknar-knapp" id="minus-${v.id}"${v.antal <= 0 ? ' disabled' : ''}>−</button>
          <span class="antal-display${v.antal === 0 ? ' noll' : ''}">${v.antal}</span>
          <button class="raknar-knapp" id="plus-${v.id}">＋</button>
        </div>
      </div>`;
    }

    // ── Antal ±1 med historiklogg ────────────────────────────────────

    function andraAntal(id, delta) {
      const v = viner.find(v => v.id === id);
      if (!v) return;
      v.antal = Math.max(0, (v.antal || 0) + delta);
      v.historik = v.historik || [];
      v.historik.unshift({ datum: idag(), text: delta > 0 ? 'Lade till 1 flaska' : 'Tog ut 1 flaska' });
      spara();
      renderAllt();
    }

    // ── Modal: öppna för nytt vin ────────────────────────────────────

    document.getElementById('lagg-till-fab').addEventListener('click', () => {
      redigerarId = null;
      document.getElementById('modal-titel').textContent = 'Lägg till vin';
      document.getElementById('vin-form').reset();
      document.getElementById('f-antal').value = '1';
      document.getElementById('ta-bort-btn').style.display = 'none';
      document.getElementById('historik-sektion').style.display = 'none';
      // Rensa analysresultatet från föregående skanning
      const ap = document.getElementById('etikett-analys');
      ap.innerHTML = ''; ap.classList.remove('synlig');
      document.getElementById('etikettmagi-status').textContent = '';
      oppnaModal();
    });

    // ── Modal: öppna för redigering ──────────────────────────────────

    function oppnaRedigera(id) {
      const v = viner.find(v => v.id === id);
      if (!v) return;
      redigerarId = id;
      document.getElementById('modal-titel').textContent = 'Redigera vin';
      document.getElementById('f-namn').value        = v.namn         || '';
      document.getElementById('f-typ').value         = v.typ          || 'rött';
      document.getElementById('f-druva').value       = v.druva        || '';
      document.getElementById('f-land').value        = v.land         || '';
      document.getElementById('f-region').value      = v.region       || '';
      document.getElementById('f-arsgang').value     = v.arsgang      || '';
      document.getElementById('f-antal').value       = v.antal        ?? 1;
      document.getElementById('f-hyllplats').value   = v.hyllplats    || '';
      document.getElementById('f-drinkfran').value   = v.drinkfran    || '';
      document.getElementById('f-dricktill').value   = v.dricktill    || '';
      document.getElementById('f-anteckningar').value= v.anteckningar || '';

      const hist = v.historik || [];
      const histSek = document.getElementById('historik-sektion');
      if (hist.length) {
        histSek.style.display = 'block';
        document.getElementById('historik-lista').innerHTML = hist
          .map(e => `<li><span class="hist-datum">${h(e.datum)}</span><span>${h(e.text)}</span></li>`)
          .join('');
      } else {
        histSek.style.display = 'none';
      }

      document.getElementById('ta-bort-btn').style.display = '';
      oppnaModal();
    }

    // ── Spara formulär ───────────────────────────────────────────────

    document.getElementById('vin-form').addEventListener('submit', e => {
      e.preventDefault();
      const ny = lasForm();

      if (redigerarId) {
        const idx = viner.findIndex(v => v.id === redigerarId);
        const gammalt = viner[idx];
        viner[idx] = { ...gammalt, ...ny };
        if (ny.antal !== gammalt.antal) {
          viner[idx].historik = viner[idx].historik || [];
          viner[idx].historik.unshift({ datum: idag(), text: `Antal ändrat till ${ny.antal}` });
        }
      } else {
        viner.unshift({ id: nyId(), historik: [{ datum: idag(), text: 'Inlagd' }], ...ny });
      }

      spara();
      stangModal();
      renderAllt();
    });

    function lasForm() {
      return {
        namn:         document.getElementById('f-namn').value.trim(),
        typ:          document.getElementById('f-typ').value,
        druva:        document.getElementById('f-druva').value.trim(),
        land:         document.getElementById('f-land').value.trim(),
        region:       document.getElementById('f-region').value.trim(),
        arsgang:      parseInt(document.getElementById('f-arsgang').value)   || null,
        antal:        parseInt(document.getElementById('f-antal').value)     || 0,
        hyllplats:    document.getElementById('f-hyllplats').value.trim(),
        drinkfran:    parseInt(document.getElementById('f-drinkfran').value) || null,
        dricktill:    parseInt(document.getElementById('f-dricktill').value) || null,
        anteckningar: document.getElementById('f-anteckningar').value.trim()
      };
    }

    // ── Ta bort ──────────────────────────────────────────────────────

    document.getElementById('ta-bort-btn').addEventListener('click', () => {
      const v = viner.find(v => v.id === redigerarId);
      if (!v || !confirm(`Ta bort "${v.namn}"?`)) return;
      viner = viner.filter(v => v.id !== redigerarId);
      spara();
      stangModal();
      renderAllt();
    });

    // ── Modal öppna/stäng ────────────────────────────────────────────

    function oppnaModal() {
      document.getElementById('modal-overlay').classList.add('oppet');
      document.body.style.overflow = 'hidden';
    }

    function stangModal() {
      document.getElementById('modal-overlay').classList.remove('oppet');
      document.body.style.overflow = '';
      redigerarId = null;
    }

    document.getElementById('modal-stang').addEventListener('click', stangModal);
    document.getElementById('avbryt-btn').addEventListener('click', stangModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) stangModal();
    });

    // ── Typfilter ────────────────────────────────────────────────────

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('aktiv'));
        btn.classList.add('aktiv');
        filter.typ = btn.dataset.typ;
        renderGrid();
      });
    });

    document.getElementById('land-filter').addEventListener('change', e => {
      filter.land = e.target.value;
      renderGrid();
    });

    document.getElementById('sokruta').addEventListener('input', e => {
      filter.sok = e.target.value;
      renderGrid();
    });

    // ── Export ───────────────────────────────────────────────────────

    document.getElementById('exportera-btn').addEventListener('click', () => {
      const payload = JSON.stringify({ version: 1, exportdatum: idag(), viner }, null, 2);
      const blob = new Blob([payload], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: `vinkallare-${idag()}.json` });
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Import ───────────────────────────────────────────────────────

    document.getElementById('importera-fil').addEventListener('change', e => {
      const fil = e.target.files[0];
      if (!fil) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          const lista  = Array.isArray(parsed) ? parsed : (parsed.viner || []);
          if (!Array.isArray(lista)) throw new Error();
          if (!confirm(`Importera ${lista.length} viner? Befintlig data ersätts.`)) return;
          viner = lista;
          spara();
          renderAllt();
        } catch {
          alert('Ogiltigt format – kontrollera att filen är en giltig JSON-export.');
        }
      };
      reader.readAsText(fil);
      e.target.value = '';
    });

    // ── Hjälpfunktion: HTML-escape ───────────────────────────────────

    function h(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Etikettmagi ──────────────────────────────────────────────────

    // Välj bild (kamera eller filväljare) när knappen klickas
    document.getElementById('etikett-knapp').addEventListener('click', () => {
      document.getElementById('etikett-input').click();
    });

    // Hantera vald bild: skala ned → anropa Claude → förifyll formulär
    document.getElementById('etikett-input').addEventListener('change', async e => {
      const fil = e.target.files[0];
      e.target.value = ''; // tillåt samma fil igen
      if (!fil) return;

      const knapp  = document.getElementById('etikett-knapp');
      const status = document.getElementById('etikettmagi-status');

      // Hämta API-nyckel från delad localStorage (frysregistret), annars be om den
      let apiNyckel = localStorage.getItem('frysregister_apikey_v1') || '';
      if (!apiNyckel) {
        apiNyckel = (prompt('Klistra in din Anthropic API-nyckel:') || '').trim();
        if (!apiNyckel) { visaFel('Ingen API-nyckel angiven.'); return; }
        localStorage.setItem('frysregister_apikey_v1', apiNyckel);
      }

      // Hjälpfunktioner för status
      function visaFel(msg) {
        status.textContent = msg;
        status.className   = 'etikettmagi-status fel';
        knapp.disabled     = false;
        knapp.textContent  = '📷 Fota etikett';
      }

      function visaInfo(msg) {
        status.textContent = msg;
        status.className   = 'etikettmagi-status';
      }

      knapp.disabled    = true;
      knapp.textContent = '⏳ Analyserar etikett…';
      visaInfo('Komprimerar bild…');

      // Skala ned bilden via Canvas – max 1024px på längsta sidan, JPEG 0.85
      let base64, mediaType;
      try {
        base64    = await skalaOchKodera(fil, 1024, 0.85);
        mediaType = 'image/jpeg';
      } catch (err) {
        visaFel('Kunde inte läsa bilden: ' + err.message); return;
      }

      visaInfo('Skickar till Claude…');

      // Anthropic API – raw fetch eftersom projektet är vanilla HTML/JS
      let svar;
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key':                             apiNyckel,
            'anthropic-version':                     '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type':                          'application/json'
          },
          body: JSON.stringify({
            model:      'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: mediaType, data: base64 }
                },
                {
                  type: 'text',
                  text: 'Läs vinlabeln i bilden och svara med ENDAST ett JSON-objekt, inget annat.\n\n' +
                        'Format:\n' +
                        '{\n' +
                        '  "namn": "...",\n' +
                        '  "typ": "rött|vitt|mousserande|rosé|sött",\n' +
                        '  "druva": "...",\n' +
                        '  "land": "...",\n' +
                        '  "region": "...",\n' +
                        '  "arsgang": 2019,\n' +
                        '  "doft": "2-3 meningar om doftens karaktär och aromer",\n' +
                        '  "smak": "2-3 meningar om smak, fyllighet, syra, tanniner och eftersmak",\n' +
                        '  "passar_till": "konkreta maträtter, gärna vilt där det passar",\n' +
                        '  "drinkfran": 2022,\n' +
                        '  "dricktill": 2030,\n' +
                        '  "lagring": "1-2 meningar om lagringspotential och när vinet är som bäst"\n' +
                        '}\n\n' +
                        'Bedöm drickfönstret (drinkfran/dricktill) utifrån vintyp, druva, region och årgång. ' +
                        'Om etiketten inte ger tillräcklig information för en säker bedömning, sätt null på drinkfran och dricktill. ' +
                        'Svara ENBART med JSON – inga förklaringar, inga staket, inget annat.'
                }
              ]
            }]
          })
        });

        if (!resp.ok) {
          const felText = await resp.text();
          visaFel(`API-fel ${resp.status}: ${felText}`); return;
        }

        svar = await resp.json();
      } catch (err) {
        visaFel('Nätverksfel: ' + err.message); return;
      }

      // Plocka ut textblocket ur svaret
      const block = (svar.content || []).find(b => b.type === 'text');
      if (!block) { visaFel('Oväntat svar – inget textblock från Claude.'); return; }

      // Rensa eventuella ```json-staket och whitespace innan parsning
      const renText = block.text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();

      let data;
      try {
        data = JSON.parse(renText);
      } catch {
        visaFel('Kunde inte tolka svaret som JSON: ' + renText.slice(0, 120));
        return;
      }

      // Förifyll grundfält
      if (data.namn)    document.getElementById('f-namn').value    = data.namn;
      if (data.druva)   document.getElementById('f-druva').value   = data.druva;
      if (data.land)    document.getElementById('f-land').value    = data.land;
      if (data.region)  document.getElementById('f-region').value  = data.region;
      if (data.arsgang) document.getElementById('f-arsgang').value = parseInt(data.arsgang) || '';

      // Drickfönster – sätt bara om Claude gav numeriska värden
      if (data.drinkfran) document.getElementById('f-drinkfran').value = parseInt(data.drinkfran) || '';
      if (data.dricktill) document.getElementById('f-dricktill').value = parseInt(data.dricktill) || '';

      // Sätt vintyp – mappa till ett giltigt alternativ om möjligt
      const gyltigaTyper = ['rött', 'vitt', 'mousserande', 'rosé', 'sött'];
      const typVal = (data.typ || '').toLowerCase().trim();
      if (gyltigaTyper.includes(typVal)) {
        document.getElementById('f-typ').value = typVal;
      }

      // Bygg strukturerad anteckningstext av de fyra textsektionerna
      const antDel = [];
      if (data.doft)       antDel.push('🍷 Doft: '      + data.doft);
      if (data.smak)       antDel.push('👅 Smak: '      + data.smak);
      if (data.passar_till) antDel.push('🍽️ Passar till: ' + data.passar_till);
      if (data.lagring)    antDel.push('🕰️ Lagring: '   + data.lagring);
      if (antDel.length)   document.getElementById('f-anteckningar').value = antDel.join('\n\n');

      // Visa analysresultatet snyggt formaterat i modalen
      const preview = document.getElementById('etikett-analys');
      const arsTxt  = data.arsgang ? ' ' + data.arsgang : '';
      preview.innerHTML =
        `<div class="etikett-analys-rubrik">${h(data.namn || 'Vin')}${h(String(arsTxt))}</div>` +
        byggAnalysHtml(data);
      preview.classList.add('synlig');

      knapp.disabled    = false;
      knapp.textContent = '📷 Fota etikett';
      visaInfo('✓ Fälten förfyllda – kontrollera och spara');
    });

    // Bygger HTML för analysresultat-kortet
    function byggAnalysHtml(d) {
      const rader = [];
      if (d.doft)        rader.push(['🍷 Doft', d.doft]);
      if (d.smak)        rader.push(['👅 Smak', d.smak]);
      if (d.passar_till) rader.push(['🍽️ Passar till', d.passar_till]);
      if (d.lagring)     rader.push(['🕰️ Lagring', d.lagring]);
      if (d.drinkfran || d.dricktill)
        rader.push(['🗓️ Drickfönster', (d.drinkfran || '?') + '–' + (d.dricktill || '?')]);
      return rader
        .map(([etikett, text]) =>
          `<p><span class="analys-etikett">${etikett}</span>${h(text)}</p>`)
        .join('');
    }

    // Skalar och komprimerar en bild via Canvas API
    // Returnerar ett Promise med base64-strängen (utan data:-prefix)
    function skalaOchKodera(fil, maxPx, kvalitet) {
      return new Promise((resolve, reject) => {
        const img    = new Image();
        const objUrl = URL.createObjectURL(fil);

        img.onerror = () => { URL.revokeObjectURL(objUrl); reject(new Error('Bilden kunde inte laddas')); };

        img.onload = () => {
          URL.revokeObjectURL(objUrl);

          // Beräkna nytt mått med bibehållen proportion
          let w = img.naturalWidth;
          let h = img.naturalHeight;
          if (w > maxPx || h > maxPx) {
            if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
            else        { w = Math.round(w * maxPx / h); h = maxPx; }
          }

          const canvas    = document.createElement('canvas');
          canvas.width    = w;
          canvas.height   = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          // Hämta base64 utan "data:image/jpeg;base64,"-prefixet
          const dataUrl = canvas.toDataURL('image/jpeg', kvalitet);
          resolve(dataUrl.split(',')[1]);
        };

        img.src = objUrl;
      });
    }

    // ── Start ────────────────────────────────────────────────────────
    ladda();
    renderAllt();
  </script>

</body>
</html>
