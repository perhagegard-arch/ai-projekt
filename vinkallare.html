    <rect x="86" y="157" width="54" height="14" rx="2" fill="#040810" stroke="#162030" stroke-width="0.5"/>
    <text x="90" y="167.5" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#5880cc" letter-spacing="1.5">10°  16°</text>
    <!-- Touch-knappar -->
    <circle cx="152" cy="165" r="2.5" fill="#141414" stroke="#282828" stroke-width="0.5"/>
    <circle cx="160" cy="165" r="2.5" fill="#141414" stroke="#282828" stroke-width="0.5"/>
    <circle cx="168" cy="165" r="2.5" fill="#141414" stroke="#282828" stroke-width="0.5"/>

    <!-- Rött-zon: varm rödbrun bakgrund -->
    <rect x="10" y="178" width="180" height="259" fill="url(#vk-rbg)"/>

    <!-- Rött-zon label -->
    <text x="16" y="192" font-family="system-ui,sans-serif" font-size="5.5" fill="rgba(140,55,55,0.6)" letter-spacing="1.5">RÖTT</text>

    <!-- Rött-zon hyllor -->
    ${rottHyllSvg}

    <!-- Alla flaskor -->
    ${bottleSvg}

    <!-- Rökfärgat glas – tunnare overlay för att inte skymma flaskorna -->
    <rect x="10" y="32" width="180" height="405" fill="rgba(0,3,8,0.22)" pointer-events="none"/>
    <!-- Glaseffekt: diagonalt ljusbälte uppifrån vänster -->
    <polygon points="10,32 82,32 56,160 10,118" fill="rgba(255,255,255,0.055)" pointer-events="none"/>
    <!-- Glaseffekt: kantglans längs vänsterkant -->
    <rect x="10" y="32" width="2.5" height="405" fill="rgba(255,255,255,0.07)" pointer-events="none"/>
    <!-- Glaseffekt: kantglans längs överkant -->
    <rect x="10" y="32" width="180" height="1.5" fill="rgba(255,255,255,0.1)" pointer-events="none"/>
    <!-- Subtil gradient-overlay -->
    <rect x="10" y="32" width="180" height="405" fill="url(#vk-reflect)" pointer-events="none"/>
  </g>

  <!-- Handtag – vertikalt borstat stål, vänster sida -->
  <rect x="3.5" y="115" width="5.5" height="240" rx="2.75" fill="url(#vk-handle)"/>
  <ellipse cx="6.25" cy="115" rx="2.75" ry="3.5" fill="#888"/>
  <ellipse cx="6.25" cy="355" rx="2.75" ry="3.5" fill="#888"/>
  <circle  cx="6.25" cy="122" r="0.9"  fill="#333"/>
  <circle  cx="6.25" cy="348" r="0.9"  fill="#333"/>
</svg>`;

      return `<div class="rack-kort rack-kort-svg">
        <div class="rack-header">
          <div>
            <div class="rack-namn">Vinkylen</div>
            <div class="rack-info">${totalFlaskor} flaskor &nbsp;·&nbsp; <span class="zon-chip zon-chip-vitt">VITT H1–3</span> <span class="zon-chip zon-chip-rott">RÖTT H1–8</span></div>
          </div>
        </div>
        <div class="rack-svg-wrap">${svg}</div>
      </div>`;
    }

    // ── Källarvy ─────────────────────────────────────────────────────

    // Avgör om ett vin ligger i fel zon i Vinkylen
    function felZon(v) {
      if (!v.hyllplats) return false;
      const delar = v.hyllplats.split(' · ');
      if (delar[0] !== 'Vinkylen' || delar.length < 3) return false;
      const zon = delar[1];
      if (zon === 'Vitt' && ['rött', 'sött'].includes(v.typ)) return true;
      if (zon === 'Rött' && ['vitt', 'mousserande', 'rosé'].includes(v.typ)) return true;
      return false;
    }

    function renderKallare() {
      const grid = document.getElementById('kallare-grid');
      const sok  = filter.sok.toLowerCase().trim();
      grid.innerHTML = Object.entries(PLATSKONFIG)
        .map(([namn, konfig]) => rackKortHtml(namn, konfig, sok))
        .join('');
      // Koppla toggle-knappar efter att HTML skrivits
      Object.keys(PLATSKONFIG).forEach(platsNamn => {
        const btn = document.getElementById('rack-toggle-' + platsNamn);
        if (btn) btn.addEventListener('click', () => {
          if (oppnaRack.has(platsNamn)) oppnaRack.delete(platsNamn);
          else oppnaRack.add(platsNamn);
          renderKallare();
        });
      });
    }

    function rackKortHtml(platsNamn, konfig, sok) {
      if (platsNamn === 'Vinkylen') return vinkylenSvgKort(sok);
      const erOppen     = oppnaRack.has(platsNamn);
      const totalFlaskor = viner
        .filter(v => (v.hyllplats || '').startsWith(platsNamn))
        .reduce((s, v) => s + (v.antal || 0), 0);
      const totalHyllor  = konfig.zoner.reduce((s, z) => s + z.hyllor, 0);

      const typFarg = {
        rött: '#b03040', vitt: '#c0a030', mousserande: '#30a060',
        rosé: '#c04080', sött: '#c07030'
      };
      const typKlass = {
        rött: 'rott', vitt: 'vitt', mousserande: 'mous', rosé: 'rose', sött: 'sott'
      };

      const zonSektioner = konfig.zoner.map(zon => {
        const hyllRadar = [];
        for (let nr = 1; nr <= zon.hyllor; nr++) {
          const hyllStr = zon.namn
            ? `${platsNamn} · ${zon.namn} · Hylla ${nr}`
            : `${platsNamn} · Hylla ${nr}`;

          // Matchar ny format + gammalt format utan zon (bakåtkompatibilitet)
          const hyllViner = viner.filter(v => {
            if (!v.hyllplats) return false;
            if (v.hyllplats === hyllStr) return true;
            if (!zon.namn && v.hyllplats === `${platsNamn} · Hylla ${nr}`) return true;
            return false;
          });

          if (erOppen) {
            const pillsHtml = hyllViner.length === 0
              ? '<span class="rack-tom-pill">Tom</span>'
              : hyllViner.map(v => {
                  const klass   = typKlass[v.typ] || 'rott';
                  const hl      = sok ? (matcherSok(v, sok) ? ' pill-highlight' : ' pill-dim') : '';
                  const ar      = v.arsgang ? ' ' + v.arsgang : '';
                  const ant     = v.antal !== 1 ? ` ×${v.antal}` : '';
                  const felMark = felZon(v) ? ' <span class="felzon-ikon" title="Felzon: vintypen passar inte denna zon">↕</span>' : '';
                  return `<span class="rack-pill typ-${klass}${hl}">${h(v.namn + ar + ant)}${felMark}</span>`;
                }).join('');

            hyllRadar.push(`<div class="rack-hylla-rad-oppen">
              <span class="rack-hylla-nr-oppen">H${nr}</span>
              <div class="rack-pills-wrap">${pillsHtml}</div>
            </div>`);
          } else {
            const dotsHtml = hyllViner.length === 0
              ? '<span class="rack-tom-dot">—</span>'
              : hyllViner.map(v => {
                  const farg    = typFarg[v.typ] || '#666';
                  const hl      = sok ? (matcherSok(v, sok) ? ' vin-highlight' : ' vin-dim') : '';
                  const felKl   = felZon(v) ? ' zon-fel' : '';
                  const tooltip = h(v.namn) + (v.arsgang ? ' ' + v.arsgang : '') + (v.antal > 1 ? ' ×' + v.antal : '');
                  return `<span class="rack-dot${felKl}${hl}" style="background:${farg}" title="${tooltip}"></span>`;
                }).join('');

            hyllRadar.push(`<div class="rack-hylla-rad-compact">
              <span class="rack-hylla-nr-compact">H${nr}</span>
              <div class="rack-dots-wrap">${dotsHtml}</div>
            </div>`);
          }
        }

        const zonHeaderHtml = zon.namn
          ? `<div class="rack-zon-header">${zon.namn.toUpperCase()}</div>`
          : '';

        return `<div class="rack-zon ${zon.css}">${zonHeaderHtml}${hyllRadar.join('')}</div>`;
      }).join('');

      const toggleTxt = erOppen ? '▲ Stäng' : '▼ Öppna';

      return `<div class="rack-kort">
        <div class="rack-header">
          <div>
            <div class="rack-namn">${h(platsNamn)}</div>
            <div class="rack-info">${totalFlaskor} flaskor · ${totalHyllor} hyllor</div>
          </div>
          <button class="rack-toggle-knapp" id="rack-toggle-${h(platsNamn)}">${toggleTxt}</button>
        </div>
        ${zonSektioner}
      </div>`;
    }

    // ── Vinarkivet – data ────────────────────────────────────────────

    function laddaArkiv() {
      try { arkiv = JSON.parse(localStorage.getItem('vinkallare_arkiv') || '[]'); }
      catch { arkiv = []; }
    }

    function sparaArkiv() {
      localStorage.setItem('vinkallare_arkiv', JSON.stringify(arkiv));
    }

    // Arkiverar ett vin: lägger in i arkivet och tar bort från källaren
    function arkiveraVin(v, betyg, kommentar) {
      arkiv.unshift({
        ...v,
        arkivId:        nyId(),
        datumUrdrucket: idag(),
        betyg:          betyg     || null,
        arkivkommentar: kommentar || ''
      });
      sparaArkiv();
      viner = viner.filter(x => x.id !== v.id);
      spara();
      renderAllt();
    }

    // ── Vinarkivet – render ───────────────────────────────────────────

    function renderArkiv() {
      const grid = document.getElementById('arkiv-grid');
      let lista  = [...arkiv];

      const s = (arkivFilter.sok || '').toLowerCase();
      if (s) lista = lista.filter(v => matcherSok(v, s));

      if (arkivSortering === 'datum') {
        lista.sort((a, b) => (b.datumUrdrucket || '').localeCompare(a.datumUrdrucket || ''));
      } else if (arkivSortering === 'betyg') {
        lista.sort((a, b) => (b.betyg || 0) - (a.betyg || 0));
      } else if (arkivSortering === 'namn') {
        lista.sort((a, b) => (a.namn || '').localeCompare(b.namn || '', 'sv'));
      } else if (arkivSortering === 'arsgang') {
        lista.sort((a, b) => (b.arsgang || 0) - (a.arsgang || 0));
      }

      if (lista.length === 0) {
        grid.innerHTML = `<div class="arkiv-tomt">
          <div class="tomt-ikon">📚</div>
          <p>${arkiv.length === 0
            ? 'Arkivet är tomt – druckna viner hamnar här!'
            : 'Inga viner matchar sökningen.'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = lista.map(arkivkortHtml).join('');
      lista.forEach(v => {
        document.getElementById('kop-igen-' + v.arkivId)
          .addEventListener('click', () => oppnaKopIgen(v));
      });
    }

    function arkivkortHtml(v) {
      const typKlass = { rött:'typ-rott', vitt:'typ-vitt', mousserande:'typ-mous', rosé:'typ-rose', sött:'typ-sott' };
      const typLabel = { rött:'Rött', vitt:'Vitt', mousserande:'Mousserande', rosé:'Rosé', sött:'Sött' };

      const stjarnor = v.betyg
        ? '★'.repeat(v.betyg) + '<span style="color:#2a2a2a">★</span>'.repeat(5 - v.betyg)
        : '';

      const meta = [
        v.druva,
        [v.land, v.region].filter(Boolean).join(' · '),
        v.arsgang ? String(v.arsgang) : ''
      ].filter(Boolean).map(s => `<span>${h(s)}</span>`).join('');

      return `<div class="arkivkort">
        <div class="vinkort-header">
          <span class="typ-badge ${typKlass[v.typ] || 'typ-rott'}">${typLabel[v.typ] || h(v.typ)}</span>
          ${v.betyg ? `<span class="arkiv-betyg">${stjarnor}</span>` : ''}
        </div>
        <div class="vinkort-namn">${h(v.namn)}</div>
        ${meta ? `<div class="vinkort-meta">${meta}</div>` : ''}
        <div class="arkiv-datum">Drucken ${h(v.datumUrdrucket || '—')}</div>
        ${v.arkivkommentar ? `<div class="arkiv-kommentar-text">${h(v.arkivkommentar)}</div>` : ''}
        <button class="knapp-kop-igen" id="kop-igen-${v.arkivId}">↩ Köp igen / lägg tillbaka</button>
      </div>`;
    }

    // Öppnar redigera-modalen förifylld med data från arkivposten
    function oppnaKopIgen(arkivVin) {
      koparIgenArkivId = arkivVin.arkivId;
      redigerarId      = null;
      document.getElementById('modal-titel').textContent       = '↩ Köp igen / lägg tillbaka';
      document.getElementById('vin-form').reset();
      document.getElementById('f-namn').value         = arkivVin.namn         || '';
      document.getElementById('f-typ').value          = arkivVin.typ          || 'rött';
      document.getElementById('f-druva').value        = arkivVin.druva        || '';
      document.getElementById('f-land').value         = arkivVin.land         || '';
      document.getElementById('f-region').value       = arkivVin.region       || '';
      document.getElementById('f-arsgang').value      = arkivVin.arsgang      || '';
      document.getElementById('f-antal').value        = 1;
      document.getElementById('f-drinkfran').value    = arkivVin.drinkfran    || '';
      document.getElementById('f-dricktill').value    = arkivVin.dricktill    || '';
      document.getElementById('f-pris').value         = arkivVin.pris         || '';
      document.getElementById('f-anteckningar').value = arkivVin.anteckningar || '';
      document.getElementById('f-plats').value        = '';
      uppdateraHyllSelect('');
      document.getElementById('ta-bort-btn').style.display      = 'none';
      document.getElementById('historik-sektion').style.display = 'none';
      etikettReset();
      oppnaModal();
    }

    // Byter vy programmatiskt och synkar knappar + containers
    function byttVy(vy) {
      vyLage = vy;
      document.querySelectorAll('.vy-knapp')
        .forEach(b => b.classList.toggle('aktiv', b.dataset.vy === vy));
      document.getElementById('lista-container').style.display   = vy === 'lista'   ? '' : 'none';
      document.getElementById('kallare-container').style.display = vy === 'kallare' ? '' : 'none';
      document.getElementById('arkiv-container').style.display   = vy === 'arkiv'   ? '' : 'none';
    }

    // ── Sista-flaskan-dialog ─────────────────────────────────────────

    let sistaFlaskanVin = null;
    let valtBetyg       = 0;

    function visSistaFlaskaDialog(v) {
      sistaFlaskanVin = v;
      valtBetyg       = 0;
      document.getElementById('sista-flaskan-namn').textContent = v.namn;
      document.getElementById('sista-knappar').style.display    = '';
      document.getElementById('betyg-panel').style.display      = 'none';
      document.getElementById('arkiv-kommentar-input').value    = '';
      uppdateraBetygStjarnor(0);
      document.getElementById('sista-flaskan-overlay').classList.add('oppet');
      document.body.style.overflow = 'hidden';
    }

    function stangSistaFlaskan() {
      document.getElementById('sista-flaskan-overlay').classList.remove('oppet');
      document.body.style.overflow = '';
      sistaFlaskanVin = null;
    }

    function uppdateraBetygStjarnor(val) {
      document.querySelectorAll('.stjarna').forEach((btn, i) => {
        btn.classList.toggle('aktiv', i < val);
      });
    }

    document.getElementById('sista-flaskan-stang').addEventListener('click', stangSistaFlaskan);

    document.getElementById('sista-flaskan-overlay').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) stangSistaFlaskan();
    });

    document.getElementById('btn-spara-med-betyg').addEventListener('click', () => {
      document.getElementById('sista-knappar').style.display = 'none';
      document.getElementById('betyg-panel').style.display   = '';
    });

    document.getElementById('btn-bara-arkivera').addEventListener('click', () => {
      const v = sistaFlaskanVin;
      stangSistaFlaskan();
      arkiveraVin(v, null, '');
    });

    document.getElementById('btn-nej-tack').addEventListener('click', () => {
      const v = sistaFlaskanVin;
      stangSistaFlaskan();
      // Minska till 0 utan arkivering – vinet stannar kvar i listan som tomt
      v.antal = 0;
      v.historik = v.historik || [];
      v.historik.unshift({ datum: idag(), text: 'Tog ut 1 flaska' });
      spara();
      renderAllt();
    });

    document.getElementById('btn-betyg-tillbaka').addEventListener('click', () => {
      document.getElementById('betyg-panel').style.display   = 'none';
      document.getElementById('sista-knappar').style.display = '';
    });

    document.getElementById('btn-betyg-spara').addEventListener('click', () => {
      const v         = sistaFlaskanVin;
      const kommentar = document.getElementById('arkiv-kommentar-input').value.trim();
      stangSistaFlaskan();
      arkiveraVin(v, valtBetyg || null, kommentar);
    });

    // Stjärnhover och klick för betygspanelen
    document.querySelectorAll('.stjarna').forEach((btn, i) => {
      btn.addEventListener('click', () => {
        valtBetyg = i + 1;
        uppdateraBetygStjarnor(valtBetyg);
      });
      btn.addEventListener('mouseenter', () => uppdateraBetygStjarnor(i + 1));
      btn.addEventListener('mouseleave', () => uppdateraBetygStjarnor(valtBetyg));
    });

    document.getElementById('arkiv-sokruta').addEventListener('input', e => {
      arkivFilter.sok = e.target.value;
      renderArkiv();
    });

    document.getElementById('arkiv-sortering').addEventListener('change', e => {
      arkivSortering = e.target.value;
      renderArkiv();
    });

    // ── Vyväxlare ────────────────────────────────────────────────────

    document.querySelectorAll('.vy-knapp').forEach(btn => {
      btn.addEventListener('click', () => {
        byttVy(btn.dataset.vy);
        if (vyLage === 'kallare') renderKallare();
        else if (vyLage === 'arkiv') renderArkiv();
        else renderGrid();
      });
    });

    // ── Start ────────────────────────────────────────────────────────
    ladda();
    laddaArkiv();
    renderAllt();
  </script>

</body>
</html>
