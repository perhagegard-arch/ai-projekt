<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinkällaren – Pers Kök & Vinkällare</title>
  <style>
    /* Mörkt tema per CLAUDE.md */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 6rem;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-emblem {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 50%;
    }

    .header-titel {
      font-size: 1.05rem;
      font-weight: 700;
      flex: 1;
    }

    .tillbaka {
      color: #888;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.4rem 0.7rem;
      border: 1px solid #333;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .tillbaka:hover { color: #e0e0e0; border-color: #555; }

    /* ── Huvudinnehåll ───────────────────────────────────────────── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1rem;
    }

    /* ── Statistikrad ────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .stat-post {
      text-align: center;
      padding: 0.8rem 0.5rem;
      border-right: 1px solid #2a2a2a;
      font-size: 0.75rem;
      color: #777;
    }

    .stat-post:last-child { border-right: none; }

    .stat-siffra {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0e0e0;
      line-height: 1.25;
    }

    /* ── Filterrad ───────────────────────────────────────────────── */
    .filterrad {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .sok-input {
      flex: 1;
      min-width: 160px;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      outline: none;
    }

    .sok-input::placeholder { color: #555; }
    .sok-input:focus { border-color: #555; }

    .filter-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #999;
      font-size: 0.8rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .filter-btn.aktiv                        { background: #2a2a2a; border-color: #555; color: #e0e0e0; }
    .filter-btn[data-typ="rött"].aktiv       { background: #2a0d14; border-color: #7a1a2a; color: #e07a8a; }
    .filter-btn[data-typ="vitt"].aktiv       { background: #271d08; border-color: #7a5f14; color: #e0c06a; }
    .filter-btn[data-typ="mousserande"].aktiv{ background: #0d2a1a; border-color: #1a7a4a; color: #6ae0a0; }
    .filter-btn[data-typ="rosé"].aktiv       { background: #2a0d1a; border-color: #7a1a3a; color: #e07ab0; }
    .filter-btn[data-typ="sött"].aktiv       { background: #271508; border-color: #7a4a14; color: #e0a06a; }

    .land-select {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #999;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }

    /* ── Vinkort-grid ────────────────────────────────────────────── */
    .viner-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .tomt-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: #555;
    }

    .tomt-ikon { font-size: 3.5rem; margin-bottom: 0.75rem; }

    /* ── Vinkort ─────────────────────────────────────────────────── */
    .vinkort {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .vinkort:hover { border-color: #3a3a3a; }

    .vinkort-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* Typ-badges */
    .typ-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .typ-rott  { background: rgba(122,26,42,0.3);  color: #e07a8a; border: 1px solid #7a1a2a; }
    .typ-vitt  { background: rgba(122,95,20,0.3);  color: #e0c06a; border: 1px solid #7a5f14; }
    .typ-mous  { background: rgba(26,122,74,0.3);  color: #6ae0a0; border: 1px solid #1a7a4a; }
    .typ-rose  { background: rgba(122,26,58,0.3);  color: #e07ab0; border: 1px solid #7a1a3a; }
    .typ-sott  { background: rgba(122,74,20,0.3);  color: #e0a06a; border: 1px solid #7a4a14; }

    .edit-knapp {
      background: none;
      border: none;
      color: #444;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.15rem 0.3rem;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s;
      line-height: 1;
    }

    .edit-knapp:hover { color: #aaa; }

    .vinkort-namn {
      font-size: 0.95rem;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.3;
    }

    .vinkort-meta {
      font-size: 0.78rem;
      color: #888;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
    }

    .hyllplats-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #666;
      background: #252525;
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
    }

    /* Pristagg på vinkort */
    .pris-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #888;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
    }

    /* Drickfönster */
    .drinkfonstret {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      border-radius: 8px;
      padding: 0.22rem 0.55rem;
    }

    .drink-ok       { color: #555; }
    .drink-snart    { background: rgba(180,130,0,0.14);  color: #e0b040; border: 1px solid rgba(180,130,0,0.3); }
    .drink-passerat { background: rgba(180,50,50,0.14);  color: #e07070; border: 1px solid rgba(180,50,50,0.3); }

    /* Flaskräknare */
    .raknar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.6rem;
      margin-top: 0.2rem;
      border-top: 1px solid #242424;
    }

    .antal-display {
      font-size: 1.4rem;
      font-weight: 700;
      min-width: 2.5rem;
      text-align: center;
    }

    .antal-display.noll { color: #444; }

    .raknar-knapp {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #242424;
      color: #e0e0e0;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
    }

    .raknar-knapp:active { background: #333; }
    .raknar-knapp:disabled { opacity: 0.25; cursor: default; }

    /* ── Export/import ───────────────────────────────────────────── */
    .verktygsrad {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .verktygknapp {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #999;
      font-size: 0.85rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }

    .verktygknapp:hover { background: #252525; color: #e0e0e0; }

    /* ── FAB ─────────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 58px;
      height: 58px;
      border-radius: 17px;
      background: #7a1a2a;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, background 0.12s;
      z-index: 50;
    }

    .fab:hover   { background: #9a2a3a; }
    .fab:active  { transform: scale(0.93); }

    /* ── Modal ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.oppet { opacity: 1; pointer-events: all; }

    .modal {
      background: #1e1e1e;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 2.5rem;
      transform: translateY(100%);
      transition: transform 0.22s ease;
    }

    .modal-overlay.oppet .modal { transform: translateY(0); }

    .modal-rubrik {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-stang {
      background: none;
      border: none;
      color: #555;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }

    .modal-stang:hover { color: #aaa; }

    /* Formulärfält */
    .formrad {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .formrad.hel { grid-template-columns: 1fr; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: #888;
    }

    input, select, textarea {
      background: #282828;
      border: 1px solid #383838;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }

    input:focus, select:focus, textarea:focus { border-color: #7a1a2a; }

    textarea { resize: vertical; min-height: 140px; }

    select option { background: #282828; }

    /* Historik */
    .historik-label {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1rem 0 0.4rem;
    }

    .historik-lista {
      list-style: none;
      font-size: 0.78rem;
      color: #555;
    }

    .historik-lista li {
      display: flex;
      gap: 0.75rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .hist-datum { color: #444; flex-shrink: 0; }

    /* Modalknappar */
    .modal-knappar {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .knapp-spara {
      flex: 1;
      min-width: 100px;
      padding: 0.85rem;
      background: #7a1a2a;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-spara:hover { background: #9a2a3a; }

    .knapp-avbryt {
      padding: 0.85rem 1.25rem;
      background: #252525;
      border: 1px solid #333;
      border-radius: 12px;
      color: #aaa;
      font-size: 0.95rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-slett {
      padding: 0.85rem 1rem;
      background: transparent;
      border: 1px solid #4a1a1a;
      border-radius: 12px;
      color: #9a5050;
      font-size: 0.95rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .knapp-slett:hover { background: rgba(90,26,26,0.3); }

    /* ── Etikettmagi ─────────────────────────────────────────────── */
    .etikett-rad {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .etikett-knapp {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.7rem;
      background: #1c1c2e;
      border: 1px dashed #4a2a5a;
      border-radius: 12px;
      color: #c080e0;
      font-size: 0.9rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .etikett-knapp:hover  { background: #25253a; }
    .etikett-knapp:disabled { opacity: 0.5; cursor: default; }

    .etikett-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #4a2a5a;
      flex-shrink: 0;
    }

    /* Analysera-knapp – hel bredd, lila solid */
    .etikett-analysera {
      width: 100%;
      margin-top: 0.25rem;
      margin-bottom: 0.75rem;
      border-style: solid;
      background: #2a1a3e;
      border-color: #7a3aa0;
      color: #d090f0;
    }

    .etikett-analysera:hover { background: #38225a; }

    .etikettmagi-status {
      font-size: 0.82rem;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
      color: #888;
      text-align: center;
    }

    .etikettmagi-status.fel { color: #e05060; }

    /* Analysresultat-kort – visas efter lyckad skanning */
    .etikett-analys {
      display: none;
      background: #1a1a2e;
      border: 1px solid #4a2a5a;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #ccc;
    }

    .etikett-analys.synlig { display: block; }

    .etikett-analys-rubrik {
      font-weight: 700;
      font-size: 0.95rem;
      color: #c080e0;
      margin-bottom: 0.65rem;
    }

    .etikett-analys p { margin-bottom: 0.45rem; }
    .etikett-analys p:last-child { margin-bottom: 0; }

    .analys-etikett {
      display: block;
      font-size: 0.72rem;
      color: #777;
      margin-bottom: 0.1rem;
    }

    /* ── Platsstats – rad under stats som visar flaskor per plats ── */
    .platsstats {
      display: none;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-top: none;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      margin-top: -1.25rem;
    }

    .platsstats-post {
      flex: 1;
      text-align: center;
      padding: 0.45rem 0.5rem;
      border-right: 1px solid #2a2a2a;
      font-size: 0.72rem;
      color: #666;
    }

    .platsstats-post:last-child { border-right: none; }

    .platsstats-siffra {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: #aaa;
      line-height: 1.3;
    }

    /* Källarens värde – toggle och panel */
    .varde-toggle {
      display: block;
      margin: 0 auto 0.7rem;
      background: none;
      border: 1px solid #2a2a2a;
      color: #777;
      border-radius: 8px;
      padding: 0.32rem 1rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .varde-toggle:hover { border-color: #7a4020; color: #c08060; }

    .varde-sektion {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.25rem;
    }

    .varde-total {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #d4a84b;
      line-height: 1.2;
    }

    .varde-total-label {
      text-align: center;
      font-size: 0.78rem;
      color: #555;
      margin-top: 0.1rem;
      margin-bottom: 0.9rem;
    }

    .varde-rader {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }

    .varde-rad {
      flex: 1 1 150px;
      background: #1e1e1e;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
    }

    .varde-rad-rubrik {
      font-size: 0.68rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }

    .varde-rad-post {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #999;
      padding: 0.12rem 0;
    }

    .varde-rad-post span:last-child { color: #c8a060; font-weight: 600; }

    .varde-disclaimer {
      font-size: 0.72rem;
      color: #555;
      text-align: center;
      margin-top: 0.4rem;
    }

    /* Bulk-prisuppskattning */
    .uppskatta-rad {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .uppskatta-knapp {
      background: none;
      border: 1px solid #2a2a2a;
      color: #777;
      border-radius: 8px;
      padding: 0.32rem 1rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .uppskatta-knapp:hover:not(:disabled) { border-color: #3a5a3a; color: #80b080; }
    .uppskatta-knapp:disabled { opacity: 0.45; cursor: default; }

    .uppskatta-avbryt {
      background: none;
      border: 1px solid #4a1a1a;
      color: #c06060;
      border-radius: 8px;
      padding: 0.32rem 0.7rem;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .uppskatta-avbryt:hover { border-color: #903030; color: #e08080; }

    .uppskatta-status {
      font-size: 0.78rem;
      color: #888;
      text-align: center;
      margin-bottom: 0.9rem;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .uppskatta-status .upp-fel { color: #c07070; }

    /* ── Responsivt ──────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .stat-post:nth-child(2) { border-right: none; }
      .stat-post:nth-child(3),
      .stat-post:nth-child(4) { border-top: 1px solid #2a2a2a; }
      .formrad { grid-template-columns: 1fr; }
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .modal { border-radius: 20px; margin: 1rem; max-height: 85vh; }
    }

    /* ── Vyväxlare ──────────────────────────────────────────────── */
    .vy-toggle {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .vy-knapp {
      padding: 0.45rem 0.75rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: transparent;
      color: #777;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .vy-knapp.aktiv {
      background: #2a2a2a;
      border-color: #555;
      color: #e0e0e0;
    }

    /* ── Källarvy – rack-grid ────────────────────────────────────── */
    .kallare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .rack-kort {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
    }

    .rack-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: #1f1f1f;
      border-bottom: 1px solid #2a2a2a;
      gap: 0.75rem;
    }

    .rack-namn { font-size: 0.95rem; font-weight: 700; color: #e0e0e0; }

    .rack-info { font-size: 0.72rem; color: #666; margin-top: 0.1rem; }

    .rack-toggle-knapp {
      background: transparent;
      border: 1px solid #333;
      border-radius: 8px;
      color: #777;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      transition: all 0.12s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .rack-toggle-knapp:hover { border-color: #555; color: #e0e0e0; }

    /* Zon-sektioner */
    .rack-zon         { padding: 0.5rem 0.75rem 0.65rem; }
    .zon-vitt         { background: #08121e; border-left: 3px solid #1a3a5a; }
    .zon-rott         { background: #130707; border-left: 3px solid #4a1010; }
    .zon-neutral      { background: #131313; border-left: 3px solid #1e1e1e; }

    .rack-zon-header {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.2rem 0 0.35rem;
      margin-bottom: 0.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .zon-vitt .rack-zon-header { color: #2d5a8a; }
    .zon-rott .rack-zon-header { color: #7a2020; }

    /* Kompakt rad – prickar */
    .rack-hylla-rad-compact {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 18px;
      padding: 0.12rem 0;
    }

    .rack-hylla-nr-compact {
      font-size: 0.6rem;
      color: #333;
      width: 1.3rem;
      text-align: right;
      flex-shrink: 0;
    }

    .rack-dots-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      flex: 1;
      align-items: center;
    }

    .rack-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      opacity: 0.8;
      transition: opacity 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
      cursor: default;
    }

    .rack-dot.zon-fel     { box-shadow: 0 0 0 2px #a08000; }
    .rack-dot.vin-dim     { opacity: 0.1; }
    .rack-dot.vin-highlight { opacity: 1; box-shadow: 0 0 0 2px rgba(255,255,255,0.55); }

    .rack-tom-dot { font-size: 0.58rem; color: #252525; }

    /* Expanderad rad – pills */
    .rack-hylla-rad-oppen {
      display: flex;
      gap: 0.4rem;
      padding: 0.28rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      align-items: flex-start;
    }

    .rack-hylla-rad-oppen:last-child { border-bottom: none; }

    .rack-hylla-nr-oppen {
      font-size: 0.68rem;
      color: #444;
      width: 1.3rem;
      flex-shrink: 0;
      padding-top: 0.2rem;
    }

    .rack-pills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.28rem;
      flex: 1;
    }

    .rack-pill {
      font-size: 0.71rem;
      padding: 0.16rem 0.42rem;
      border-radius: 6px;
      transition: opacity 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      cursor: default;
    }

    /* Återanvänd typ-färgerna */
    .rack-pill.typ-rott { background: rgba(122,26,42,0.3);  color: #e07a8a; border: 1px solid #7a1a2a; }
    .rack-pill.typ-vitt { background: rgba(122,95,20,0.3);  color: #e0c06a; border: 1px solid #7a5f14; }
    .rack-pill.typ-mous { background: rgba(26,122,74,0.3);  color: #6ae0a0; border: 1px solid #1a7a4a; }
    .rack-pill.typ-rose { background: rgba(122,26,58,0.3);  color: #e07ab0; border: 1px solid #7a1a3a; }
    .rack-pill.typ-sott { background: rgba(122,74,20,0.3);  color: #e0a06a; border: 1px solid #7a4a14; }

    .rack-pill.pill-dim       { opacity: 0.12; }
    .rack-pill.pill-highlight { box-shadow: 0 0 0 1px rgba(255,255,255,0.45); opacity: 1; }

    .rack-tom-pill { font-size: 0.67rem; color: #282828; font-style: italic; padding: 0.16rem 0; }

    .felzon-ikon {
      font-size: 0.6rem;
      color: #a08000;
      font-style: normal;
      cursor: help;
      flex-shrink: 0;

    /* ── SVG-vinkyl (Vinkylen illustration) ─────────────────────── */

    /* ── Vinarkivet ─────────────────────────────────────────────────── */

    /* Sista-flaskan-dialogens rubrik */
    #sista-flaskan-overlay .modal-rubrik { color: #e0c06a; }

    }

    .knapp-arkivera-betyg {

    /* Betygsstjärnor */

  </style>
</head>

  <script>
    // Datalagring i localStorage med prefix "vinkallare_"
    const LS_NYCKEL = 'vinkallare_viner';
    const AR_NU = new Date().getFullYear();

    // Hyllplatskonfiguration – Vinkylen har zoner Vitt (H1–3) och Rött (H1–8)
    const PLATSKONFIG = {
      Vinkylen: {
        zoner: [
          { namn: 'Vitt', hyllor: 3, css: 'zon-vitt' },
          { namn: 'Rött', hyllor: 8, css: 'zon-rott' }
        ]
      },
      Garaget: {
        zoner: [
          { namn: '', hyllor: 10, css: 'zon-neutral' }
        ]
      }
    };

    let viner = [];
    let arkiv = [];
    let filter       = { typ: '', land: '', sok: '' };
    let arkivFilter  = { sok: '' };
    let arkivSortering = 'datum';
    let redigerarId      = null;
    let koparIgenArkivId = null;   // satt när redigera-modalen används för köp-igen
    let vyLage    = 'lista';       // 'lista' | 'kallare' | 'arkiv'
    let oppnaRack = new Set();     // rack-namn som är expanderade i källarvyn

    // ── Data ────────────────────────────────────────────────────────

    function ladda() {
      try { viner = JSON.parse(localStorage.getItem(LS_NYCKEL) || '[]'); }
      catch { viner = []; }
    }

    function spara() {
      localStorage.setItem(LS_NYCKEL, JSON.stringify(viner));
    }

    function nyId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function idag() {
      return new Date().toISOString().slice(0, 10);
    }

    // Returnerar 'snart', 'passerat' eller null baserat på drickfönster
    function drinkStatus(v) {
      if (!v.dricktill) return null;
      const till = parseInt(v.dricktill);
      if (AR_NU > till) return 'passerat';
      if (till - AR_NU <= 2) return 'snart';
      return null;
    }

    // ── Render ──────────────────────────────────────────────────────

    // Returnerar true om vinet matchar söktermen s (lowercase)
    function matcherSok(v, s) {
      return [v.namn, v.druva, v.land, v.region].some(f => (f || '').toLowerCase().includes(s));
    }

    function renderAllt() {
      renderStats();
      renderLandFilter();
      if (vyLage === 'lista') renderGrid();
      else if (vyLage === 'kallare') renderKallare();
      else if (vyLage === 'arkiv') renderArkiv();
    }

    function renderStats() {
      const total = viner.reduce((s, v) => s + (v.antal || 0), 0);
      const lander = new Set(viner.filter(v => v.land).map(v => v.land)).size;
      const artal = viner.filter(v => v.arsgang).map(v => v.arsgang);
      document.getElementById('stat-flaskor').textContent = total;
      document.getElementById('stat-viner').textContent = viner.length;
      document.getElementById('stat-aldst').textContent = artal.length ? Math.min(...artal) : '—';
      document.getElementById('stat-lander').textContent = lander;
      renderPlatsstats();
      renderVarde();
    }

    // Visar/döljer källarens värdesummering
    let visaVarde = false;

    function renderVarde() {
      const el = document.getElementById('varde-sektion');
      if (!visaVarde) { el.style.display = 'none'; return; }

      // Viner med pris och minst en flaska
      const medPris   = viner.filter(v => v.pris > 0 && v.antal > 0);
      const utanPris  = viner.filter(v => !(v.pris > 0) && v.antal > 0);
      const total     = medPris.reduce((s, v) => s + v.pris * v.antal, 0);

      // Delsummor per plats
      const platsDel = Object.keys(PLATSKONFIG).map(p => ({
        namn: p,
        varde: medPris.filter(v => (v.hyllplats || '').startsWith(p))
                      .reduce((s, v) => s + v.pris * v.antal, 0)
      })).filter(p => p.varde > 0);

      // Delsummor per vintyp
      const typDel = ['rött', 'vitt', 'mousserande', 'rosé', 'sött'].map(t => ({
        namn: t.charAt(0).toUpperCase() + t.slice(1),
        varde: medPris.filter(v => v.typ === t).reduce((s, v) => s + v.pris * v.antal, 0)
      })).filter(t => t.varde > 0);

      const fmt = n => n.toLocaleString('sv-SE') + ' kr';

      el.innerHTML =
        `<div class="varde-total">${fmt(total)}</div>` +
        `<div class="varde-total-label">uppskattat källarvärde</div>` +
        `<div class="varde-rader">` +
          (platsDel.length ? `<div class="varde-rad">
            <div class="varde-rad-rubrik">Per plats</div>
            ${platsDel.map(p => `<div class="varde-rad-post"><span>${h(p.namn)}</span><span>${fmt(p.varde)}</span></div>`).join('')}
          </div>` : '') +
          (typDel.length ? `<div class="varde-rad">
            <div class="varde-rad-rubrik">Per typ</div>
            ${typDel.map(t => `<div class="varde-rad-post"><span>${h(t.namn)}</span><span>${fmt(t.varde)}</span></div>`).join('')}
          </div>` : '') +
        `</div>` +
        (utanPris.length
          ? `<div class="varde-disclaimer">⚠ ${utanPris.length} ${utanPris.length === 1 ? 'vin saknar' : 'viner saknar'} pris och ingår inte i summan</div>`
          : '');

      el.style.display = 'block';
    }

    // ── Bulk-prisuppskattning via Claude Haiku ───────────────────────

    let avbrytUppskattning = false;

    async function uppskattaPriser() {
      const statusEl  = document.getElementById('uppskatta-status');
      const knapp     = document.getElementById('uppskatta-priser-btn');
      const avbrytBtn = document.getElementById('uppskatta-avbryt-btn');

      function visaStatus(html) {
        statusEl.innerHTML = html;
        statusEl.style.display = html ? 'block' : 'none';
      }

      // Hämta eller be om API-nyckel
      let apiNyckel = localStorage.getItem('frysregister_apikey_v1') || '';
      if (!apiNyckel) {
        apiNyckel = (prompt('Klistra in din Anthropic API-nyckel:') || '').trim();
        if (!apiNyckel) { visaStatus('Ingen API-nyckel angiven.'); return; }
        localStorage.setItem('frysregister_apikey_v1', apiNyckel);
      }

      // Viner som saknar pris
      const utan = viner.filter(v => !(v.pris > 0));
      if (!utan.length) {
        visaStatus('Alla viner har redan ett pris – ingenting att uppskatta.');
        return;
      }

      // Starta körning
      avbrytUppskattning = false;
      knapp.disabled          = true;
      avbrytBtn.style.display = '';
      const totalt  = utan.length;
      let ifyllda   = 0;
      let misslyckade = 0;
      const felRader = [];

      for (let i = 0; i < utan.length; i++) {
        if (avbrytUppskattning) break;

        const v = utan[i];
        visaStatus(
          `Uppskattar ${i + 1} av ${totalt}: <em>${h(v.namn)}</em>…` +
          (felRader.length ? '\n\n' + felRader.map(r => `<span class="upp-fel">${r}</span>`).join('\n') : '')
        );

        // Bygg en kortfattad text-prompt
        const delar = [
          v.namn    ? `Namn: ${v.namn}`     : null,
          v.druva   ? `Druva: ${v.druva}`   : null,
          v.region  ? `Region: ${v.region}` : null,
          v.land    ? `Land: ${v.land}`     : null,
          v.arsgang ? `Årgång: ${v.arsgang}` : null,
        ].filter(Boolean).join('\n');

        const prompt =
          'Vilket är ett ungefärligt marknadspris i Sverige (SEK) för följande vin?\n\n' +
          delar + '\n\n' +
          'Svara med ENBART ett JSON-objekt: {"prisuppskattning": 189}\n' +
          'Avrunda till närmaste 10-tal. Sätt null om du verkligen inte vet.';

        try {
          const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'x-api-key':                                 apiNyckel,
              'anthropic-version':                         '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
              'content-type':                              'application/json'
            },
            body: JSON.stringify({
              model:      'claude-haiku-4-5-20251001',
              max_tokens: 64,
              messages:   [{ role: 'user', content: prompt }]
            })
          });

          if (!resp.ok) {
            const felText = await resp.text();
            throw new Error(`API ${resp.status}: ${felText.slice(0, 120)}`);
          }

          const svar  = await resp.json();
          const block = (svar.content || []).find(b => b.type === 'text');
          if (!block) throw new Error('Tomt svar från Claude');

          const renText = block.text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
          const data    = JSON.parse(renText);

          if (data.prisuppskattning && parseInt(data.prisuppskattning) > 0) {
            // Hitta vinet i live-arrayen (kan ha ändrats under körningen)
            const live = viner.find(x => x.id === v.id);
            if (live) {
              live.pris = parseInt(data.prisuppskattning);
              spara();
              renderAllt();
              ifyllda++;
            }
          } else {
            felRader.push(`⚠ ${v.namn}: AI svarade null – hoppar över`);
            misslyckade++;
          }
        } catch (err) {
          felRader.push(`⚠ ${h(v.namn)}: ${err.message}`);
          misslyckade++;
        }
      }

      // Avslutningsstatus
      knapp.disabled          = false;
      avbrytBtn.style.display = 'none';

      const avbrots = avbrytUppskattning ? ' (avbruten)' : '';
      let sammanfattning = `✓ Klart${avbrots} – ${ifyllda} priser ifyllda`;
      if (misslyckade) sammanfattning += `, ${misslyckade} misslyckades`;
      visaStatus(
        sammanfattning +
        (felRader.length ? '\n\n' + felRader.map(r => `<span class="upp-fel">${r}</span>`).join('\n') : '')
      );
    }

    function renderPlatsstats() {
      const el = document.getElementById('platsstats');
      // Räkna flaskor per plats baserat på att hyllplats börjar med platsnamnet
      const poster = Object.keys(PLATSKONFIG)
        .map(plats => ({
          plats,
          antal: viner
            .filter(v => (v.hyllplats || '').startsWith(plats))
            .reduce((s, v) => s + (v.antal || 0), 0)
        }))
        .filter(p => p.antal > 0);

      if (!poster.length) { el.style.display = 'none'; return; }

      el.innerHTML = poster
        .map(p => `<div class="platsstats-post"><span class="platsstats-siffra">${p.antal}</span>📍 ${h(p.plats)}</div>`)
        .join('');
      el.style.display = 'flex';
    }

    function renderLandFilter() {
      const sel = document.getElementById('land-filter');
      const valt = sel.value;
      const lander = [...new Set(viner.filter(v => v.land).map(v => v.land))].sort();
      sel.innerHTML = '<option value="">Alla länder</option>' +
        lander.map(l => `<option value="${h(l)}"${l === valt ? ' selected' : ''}>${h(l)}</option>`).join('');
    }

    function renderGrid() {
      const grid = document.getElementById('viner-grid');
      let lista = viner;

      if (filter.typ) lista = lista.filter(v => v.typ === filter.typ);
      if (filter.land) lista = lista.filter(v => v.land === filter.land);
      if (filter.sok) lista = lista.filter(v => matcherSok(v, filter.sok.toLowerCase()));

      if (lista.length === 0) {
        grid.innerHTML = `<div class="tomt-state">
          <div class="tomt-ikon">🍷</div>
          <p>${viner.length === 0
            ? 'Vinkällaren är tom – tryck ＋ för att lägga till ditt första vin!'
            : 'Inga viner matchar filtret.'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = lista.map(vinkortHtml).join('');

      lista.forEach(v => {
        document.getElementById('plus-' + v.id).addEventListener('click', () => andraAntal(v.id, 1));
        document.getElementById('minus-' + v.id).addEventListener('click', () => andraAntal(v.id, -1));
        document.getElementById('edit-' + v.id).addEventListener('click', () => oppnaRedigera(v.id));
      });
    }

    function vinkortHtml(v) {
      const typKlass  = { rött:'typ-rott', vitt:'typ-vitt', mousserande:'typ-mous', rosé:'typ-rose', sött:'typ-sott' };
      const typLabel  = { rött:'Rött', vitt:'Vitt', mousserande:'Mousserande', rosé:'Rosé', sött:'Sött' };
      const ds = drinkStatus(v);

      // Metarad: druva · land·region · årgång
      const meta = [
        v.druva,
        [v.land, v.region].filter(Boolean).join(' · '),
        v.arsgang ? String(v.arsgang) : ''
      ].filter(Boolean).map(s => `<span>${h(s)}</span>`).join('');

      // Drickfönster-badge
      let drinkBadge = '';
      if (v.drinkfran || v.dricktill) {
        const span = (v.drinkfran || '?') + '–' + (v.dricktill || '?');
        if (ds === 'passerat')
          drinkBadge = `<span class="drinkfonstret drink-passerat">⚠ Passerat fönster ${span}</span>`;
        else if (ds === 'snart')
          drinkBadge = `<span class="drinkfonstret drink-snart">⏳ Drick snart ${span}</span>`;
        else
          drinkBadge = `<span class="drinkfonstret drink-ok">🍷 ${span}</span>`;
      }

      return `<div class="vinkort">
        <div class="vinkort-header">
          <span class="typ-badge ${typKlass[v.typ] || 'typ-rott'}">${typLabel[v.typ] || h(v.typ)}</span>
          <button class="edit-knapp" id="edit-${v.id}" title="Redigera">✎</button>
        </div>
        <div class="vinkort-namn">${h(v.namn)}</div>
        ${meta ? `<div class="vinkort-meta">${meta}</div>` : ''}
        ${v.hyllplats ? `<div class="hyllplats-tag">📍 ${h(v.hyllplats)}${felZon(v) ? ' <span class="felzon-ikon" title="Felzon: vintypen passar inte denna zon">↕</span>' : ''}</div>` : ''}
        ${v.pris ? `<div class="pris-tag">💰 ${v.pris} kr/fl</div>` : ''}
        ${drinkBadge}
        <div class="raknar">
          <button class="raknar-knapp" id="minus-${v.id}"${v.antal <= 0 ? ' disabled' : ''}>−</button>
          <span class="antal-display${v.antal === 0 ? ' noll' : ''}">${v.antal}</span>
          <button class="raknar-knapp" id="plus-${v.id}">＋</button>
        </div>
      </div>`;
    }

    // ── Antal ±1 med historiklogg ────────────────────────────────────

    function andraAntal(id, delta) {
      const v = viner.find(v => v.id === id);
      if (!v) return;
      // Trigga arkiv-dialog när sista flaskan tas ut
      if (delta === -1 && (v.antal || 0) === 1) {
        visSistaFlaskaDialog(v);
        return;
      }
      v.antal = Math.max(0, (v.antal || 0) + delta);
      v.historik = v.historik || [];
      v.historik.unshift({ datum: idag(), text: delta > 0 ? 'Lade till 1 flaska' : 'Tog ut 1 flaska' });
      spara();
      renderAllt();
    }

    // ── Modal: öppna för nytt vin ────────────────────────────────────

    document.getElementById('lagg-till-fab').addEventListener('click', () => {
      redigerarId = null;
      document.getElementById('modal-titel').textContent = 'Lägg till vin';
      document.getElementById('vin-form').reset();
      document.getElementById('f-antal').value = '1';
      document.getElementById('ta-bort-btn').style.display = 'none';
      document.getElementById('historik-sektion').style.display = 'none';
      etikettReset();          // nollställ bildval, tummar och analysresultat
      uppdateraHyllSelect(''); // töm hylla-select
      oppnaModal();
    });

    // ── Modal: öppna för redigering ──────────────────────────────────

    function oppnaRedigera(id) {
      const v = viner.find(v => v.id === id);
      if (!v) return;
      redigerarId = id;
      document.getElementById('modal-titel').textContent = 'Redigera vin';
      document.getElementById('f-namn').value        = v.namn         || '';
      document.getElementById('f-typ').value         = v.typ          || 'rött';
      document.getElementById('f-druva').value       = v.druva        || '';
      document.getElementById('f-land').value        = v.land         || '';
      document.getElementById('f-region').value      = v.region       || '';
      document.getElementById('f-arsgang').value     = v.arsgang      || '';
      document.getElementById('f-antal').value       = v.antal        ?? 1;
      // Splitta "Vinkylen · Vitt · Hylla 2" eller "Garaget · Hylla 5" för selects
      const hp      = v.hyllplats || '';
      const sepIdx  = hp.indexOf(' · ');
      const hyllPlats = sepIdx >= 0 ? hp.slice(0, sepIdx) : hp;
      const hyllVal   = sepIdx >= 0 ? hp.slice(sepIdx + 3) : '';
      document.getElementById('f-plats').value = hyllPlats;
      uppdateraHyllSelect(hyllPlats);
      document.getElementById('f-hylla').value = hyllVal;
      document.getElementById('f-drinkfran').value   = v.drinkfran    || '';
      document.getElementById('f-dricktill').value   = v.dricktill    || '';
      document.getElementById('f-pris').value        = v.pris         || '';
      document.getElementById('f-anteckningar').value= v.anteckningar || '';

      const hist = v.historik || [];
      const histSek = document.getElementById('historik-sektion');
      if (hist.length) {
        histSek.style.display = 'block';
        document.getElementById('historik-lista').innerHTML = hist
          .map(e => `<li><span class="hist-datum">${h(e.datum)}</span><span>${h(e.text)}</span></li>`)
          .join('');
      } else {
        histSek.style.display = 'none';
      }

      document.getElementById('ta-bort-btn').style.display = '';
      oppnaModal();
    }

    // ── Spara formulär ───────────────────────────────────────────────

    document.getElementById('vin-form').addEventListener('submit', e => {
      e.preventDefault();
      const ny = lasForm();

      // Köp-igen-läge: flytta från arkiv tillbaka till källaren
      if (koparIgenArkivId) {
        const arkivPost      = arkiv.find(a => a.arkivId === koparIgenArkivId);
        const gammalHistorik = arkivPost ? (arkivPost.historik || []) : [];
        arkiv                = arkiv.filter(a => a.arkivId !== koparIgenArkivId);
        sparaArkiv();
        koparIgenArkivId = null;
        viner.unshift({
          id:       nyId(),
          historik: [{ datum: idag(), text: 'Köpt igen / lagd tillbaka från arkivet' }, ...gammalHistorik],
          ...ny
        });
        spara();
        stangModal();
        byttVy('lista');
        renderAllt();
        return;
      }

      if (redigerarId) {
        const idx = viner.findIndex(v => v.id === redigerarId);
        const gammalt = viner[idx];
        viner[idx] = { ...gammalt, ...ny };
        if (ny.antal !== gammalt.antal) {
          viner[idx].historik = viner[idx].historik || [];
          viner[idx].historik.unshift({ datum: idag(), text: `Antal ändrat till ${ny.antal}` });
        }
      } else {
        viner.unshift({ id: nyId(), historik: [{ datum: idag(), text: 'Inlagd' }], ...ny });
      }

      spara();
      stangModal();
      renderAllt();
    });

    function lasForm() {
      return {
        namn:         document.getElementById('f-namn').value.trim(),
        typ:          document.getElementById('f-typ').value,
        druva:        document.getElementById('f-druva').value.trim(),
        land:         document.getElementById('f-land').value.trim(),
        region:       document.getElementById('f-region').value.trim(),
        arsgang:      parseInt(document.getElementById('f-arsgang').value)   || null,
        antal:        parseInt(document.getElementById('f-antal').value)     || 0,
        hyllplats:    (() => {
          const p  = document.getElementById('f-plats').value;
          const hy = document.getElementById('f-hylla').value; // t.ex. "Vitt · Hylla 2" eller "Hylla 5"
          return p && hy ? p + ' · ' + hy : (p || '');
        })(),
        drinkfran:    parseInt(document.getElementById('f-drinkfran').value) || null,
        dricktill:    parseInt(document.getElementById('f-dricktill').value) || null,
        pris:         parseInt(document.getElementById('f-pris').value)      || null,
        anteckningar: document.getElementById('f-anteckningar').value.trim()
      };
    }

    // ── Ta bort ──────────────────────────────────────────────────────

    document.getElementById('ta-bort-btn').addEventListener('click', () => {
      const v = viner.find(v => v.id === redigerarId);
      if (!v || !confirm(`Ta bort "${v.namn}"?`)) return;
      viner = viner.filter(v => v.id !== redigerarId);
      spara();
      stangModal();
      renderAllt();
    });

    // ── Modal öppna/stäng ────────────────────────────────────────────

    function oppnaModal() {
      document.getElementById('modal-overlay').classList.add('oppet');
      document.body.style.overflow = 'hidden';
    }

    function stangModal() {
      document.getElementById('modal-overlay').classList.remove('oppet');
      document.body.style.overflow = '';
      redigerarId      = null;
      koparIgenArkivId = null;
    }

    document.getElementById('uppskatta-priser-btn').addEventListener('click', uppskattaPriser);

    document.getElementById('uppskatta-avbryt-btn').addEventListener('click', () => {
      avbrytUppskattning = true;
    });

    document.getElementById('varde-toggle').addEventListener('click', () => {
      visaVarde = !visaVarde;
      document.getElementById('varde-toggle').textContent =
        visaVarde ? '💰 Dölj källarens värde' : '💰 Visa källarens värde';
      renderVarde();
    });

    document.getElementById('modal-stang').addEventListener('click', stangModal);
    document.getElementById('avbryt-btn').addEventListener('click', stangModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) stangModal();
    });

    // ── Typfilter ────────────────────────────────────────────────────

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('aktiv'));
        btn.classList.add('aktiv');
        filter.typ = btn.dataset.typ;
        renderGrid();
      });
    });

    document.getElementById('land-filter').addEventListener('change', e => {
      filter.land = e.target.value;
      renderGrid();
    });

    document.getElementById('sokruta').addEventListener('input', e => {
      filter.sok = e.target.value;
      renderGrid();
    });

    // ── Export ───────────────────────────────────────────────────────

    document.getElementById('exportera-btn').addEventListener('click', () => {
      const payload = JSON.stringify({ version: 1, exportdatum: idag(), viner, arkiv }, null, 2);
      const blob = new Blob([payload], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: `vinkallare-${idag()}.json` });
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Import ───────────────────────────────────────────────────────

    document.getElementById('importera-fil').addEventListener('change', e => {
      const fil = e.target.files[0];
      if (!fil) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          const lista      = Array.isArray(parsed) ? parsed : (parsed.viner || []);
          const arkivLista = parsed.arkiv || [];
          if (!Array.isArray(lista)) throw new Error();
          if (!confirm(`Importera ${lista.length} viner och ${arkivLista.length} arkivposter? Befintlig data ersätts.`)) return;
          viner = lista;
          arkiv = arkivLista;
          spara();
          sparaArkiv();
          renderAllt();
        } catch {
          alert('Ogiltigt format – kontrollera att filen är en giltig JSON-export.');
        }
      };
      reader.readAsText(fil);
      e.target.value = '';
    });

    // ── Hjälpfunktion: HTML-escape ───────────────────────────────────

    function h(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Hyllplats: dynamiska selects ────────────────────────────────

    // Populera f-plats från PLATSKONFIG
    Object.keys(PLATSKONFIG).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      document.getElementById('f-plats').appendChild(opt);
    });

    function uppdateraHyllSelect(plats) {
      const sel = document.getElementById('f-hylla');
      sel.innerHTML = '<option value="">Välj hylla</option>';
      const konfig = PLATSKONFIG[plats];
      if (plats && konfig) {
        konfig.zoner.forEach(zon => {
          if (zon.namn) {
            // Vinkylen: en optgroup per zon
            const grp = document.createElement('optgroup');
            grp.label = zon.namn + '-zonen';
            for (let i = 1; i <= zon.hyllor; i++) {
              const opt = document.createElement('option');
              opt.value = zon.namn + ' · Hylla ' + i;
              opt.textContent = 'Hylla ' + i + ' (' + zon.namn + ')';
              grp.appendChild(opt);
            }
            sel.appendChild(grp);
          } else {
            // Garaget: platt lista utan zon
            for (let i = 1; i <= zon.hyllor; i++) {
              const opt = document.createElement('option');
              opt.value = 'Hylla ' + i;
              opt.textContent = 'Hylla ' + i;
              sel.appendChild(opt);
            }
          }
        });
        sel.disabled = false;
      } else {
        sel.disabled = true;
      }
    }

    document.getElementById('f-plats').addEventListener('change', function () {
      uppdateraHyllSelect(this.value);
    });

    // ── Etikettmagi ──────────────────────────────────────────────────

    // Lagrar komprimerade base64-bilder inför analys
    let bildData = { framsida: null, baksida: null };

    // Nollställer all etikettmagi-status och bildval

      bildData = { framsida: null, baksida: null };

    // Öppnar filinput och returnerar komprimerat base64 (eller null)
    function valjEtikettBild(inputId, thumbId) {
      return new Promise(resolve => {
        const inp = document.getElementById(inputId);
        inp.value = '';
        inp.onchange = async () => {
          const fil = inp.files[0];
          inp.value = '';
          if (!fil) { resolve(null); return; }
          try {
            const b64 = await skalaOchKodera(fil, 1024, 0.85);
            const thumb = document.getElementById(thumbId);
            thumb.src          = 'data:image/jpeg;base64,' + b64;
            thumb.style.display = 'block';
            resolve(b64);
          } catch { resolve(null); }
        };
        inp.click();
      });
    }

    document.getElementById('knapp-framsida').addEventListener('click', async () => {
      const b64 = await valjEtikettBild('etikett-framsida', 'thumb-framsida');
      if (!b64) return;
      bildData.framsida = b64;
      // Visa baksida-knapp och analysera-knapp
      document.getElementById('etikett-baksida-rad').style.display = 'flex';
      document.getElementById('knapp-analysera').style.display     = 'flex';
    });

      if (b64) bildData.baksida = b64;

    document.getElementById('knapp-analysera').addEventListener('click', async () => {
      const status       = document.getElementById('etikettmagi-status');
      const analysKnapp  = document.getElementById('knapp-analysera');

      function visaFel(msg) {
        status.textContent = msg;
        status.className   = 'etikettmagi-status fel';
        analysKnapp.disabled   = false;
        analysKnapp.textContent = '🔍 Analysera';
      }

      function visaInfo(msg) {
        status.textContent = msg;
        status.className   = 'etikettmagi-status';
      }

      if (!bildData.framsida) { visaFel('Fota framsidan först.'); return; }

      // Hämta API-nyckel från delad localStorage (frysregistret), annars be om den
      let apiNyckel = localStorage.getItem('frysregister_apikey_v1') || '';
      if (!apiNyckel) {
        apiNyckel = (prompt('Klistra in din Anthropic API-nyckel:') || '').trim();
        if (!apiNyckel) { visaFel('Ingen API-nyckel angiven.'); return; }
        localStorage.setItem('frysregister_apikey_v1', apiNyckel);
      }

      analysKnapp.disabled   = true;
      analysKnapp.textContent = '⏳ Analyserar…';
      visaInfo('Skickar till Claude…');

      // Bygg content-array: framsida alltid med, baksida om den finns
      const contentBlock = [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: bildData.framsida } }
      ];
      if (bildData.baksida) {
        contentBlock.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: bildData.baksida } });
      }

      const promptInledning = bildData.baksida
        ? 'Bild 1 är framsidan på vinlabeln och bild 2 är baksidan – kombinera informationen från båda.\n\n'
        : 'Bilden är framsidan på vinlabeln.\n\n';

      contentBlock.push({
        type: 'text',
        text: promptInledning +
              'Svara med ENDAST ett JSON-objekt, inget annat.\n\n' +
              'Format:\n' +
              '{\n' +
              '  "namn": "...",\n' +
              '  "typ": "rött|vitt|mousserande|rosé|sött",\n' +
              '  "druva": "...",\n' +
              '  "land": "...",\n' +
              '  "region": "...",\n' +
              '  "arsgang": 2019,\n' +
              '  "doft": "2-3 meningar om doftens karaktär och aromer",\n' +
              '  "smak": "2-3 meningar om smak, fyllighet, syra, tanniner och eftersmak",\n' +
              '  "passar_till": "konkreta maträtter, gärna vilt där det passar",\n' +
              '  "drinkfran": 2022,\n' +
              '  "dricktill": 2030,\n' +
              '  "lagring": "1-2 meningar om lagringspotential och när vinet är som bäst",\n' +
              '  "prisuppskattning": 189\n' +
              '}\n\n' +
              'Bedöm drickfönstret (drinkfran/dricktill) utifrån vintyp, druva, region och årgång. ' +
              'Om etiketten inte ger tillräcklig information för en säker bedömning, sätt null på drinkfran och dricktill. ' +
              'prisuppskattning ska vara ett ungefärligt marknadspris i SEK avrundat till närmaste 10-tal, ' +
              'i linje med Systembolagets prisbild för liknande viner. Sätt null om du är osäker. ' +
              'Svara ENBART med JSON – inga förklaringar, inga staket, inget annat.'
      });

      // Anthropic API – raw fetch eftersom projektet är vanilla HTML/JS
      let svar;
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key':                                 apiNyckel,
            'anthropic-version':                         '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type':                              'application/json'
          },
          body: JSON.stringify({
            model:    'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{ role: 'user', content: contentBlock }]
          })
        });

        if (!resp.ok) {
          const felText = await resp.text();
          visaFel(`API-fel ${resp.status}: ${felText}`); return;
        }

        svar = await resp.json();
      } catch (err) {
        visaFel('Nätverksfel: ' + err.message); return;
      }

      const block = (svar.content || []).find(b => b.type === 'text');
      if (!block) { visaFel('Oväntat svar – inget textblock från Claude.'); return; }

      // Rensa eventuella ```json-staket och whitespace innan parsning
      const renText = block.text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();

      let data;
      try {
        data = JSON.parse(renText);
      } catch {

        return;

      // Förifyll grundfält
      if (data.namn)    document.getElementById('f-namn').value    = data.namn;
      if (data.druva)   document.getElementById('f-druva').value   = data.druva;
      if (data.land)    document.getElementById('f-land').value    = data.land;
      if (data.region)  document.getElementById('f-region').value  = data.region;
      if (data.arsgang) document.getElementById('f-arsgang').value = parseInt(data.arsgang) || '';

      // Drickfönster – sätt bara om Claude gav numeriska värden
      if (data.drinkfran) document.getElementById('f-drinkfran').value = parseInt(data.drinkfran) || '';
      if (data.dricktill) document.getElementById('f-dricktill').value = parseInt(data.dricktill) || '';

      // Prisuppskattning från AI – förifyll om ett positivt tal returnerades
      if (data.prisuppskattning && parseInt(data.prisuppskattning) > 0)
        document.getElementById('f-pris').value = parseInt(data.prisuppskattning);

      // Vintyp – mappa till ett giltigt alternativ om möjligt
      const gyltigaTyper = ['rött', 'vitt', 'mousserande', 'rosé', 'sött'];
      const typVal = (data.typ || '').toLowerCase().trim();
      if (gyltigaTyper.includes(typVal)) document.getElementById('f-typ').value = typVal;

      // Anteckningar – strukturerad text med emoji-rubriker
      const antDel = [];
      if (data.doft)        antDel.push('🍷 Doft: '         + data.doft);
      if (data.smak)        antDel.push('👅 Smak: '         + data.smak);
      if (data.passar_till) antDel.push('🍽️ Passar till: '  + data.passar_till);
      if (data.lagring)     antDel.push('🕰️ Lagring: '      + data.lagring);
      if (antDel.length)    document.getElementById('f-anteckningar').value = antDel.join('\n\n');

      // Visa analysresultatet i modalen
      const preview = document.getElementById('etikett-analys');
      const arsTxt  = data.arsgang ? ' ' + data.arsgang : '';
      preview.innerHTML =
        `<div class="etikett-analys-rubrik">${h(data.namn || 'Vin')}${h(String(arsTxt))}</div>` +
        byggAnalysHtml(data);
      preview.classList.add('synlig');

      analysKnapp.textContent = '🔍 Analysera';

    });

    // Bygger HTML för analysresultat-kortet
    function byggAnalysHtml(d) {
      const rader = [];
      if (d.doft)        rader.push(['🍷 Doft', d.doft]);
      if (d.smak)        rader.push(['👅 Smak', d.smak]);
      if (d.passar_till) rader.push(['🍽️ Passar till', d.passar_till]);
      if (d.lagring)     rader.push(['🕰️ Lagring', d.lagring]);
      if (d.drinkfran || d.dricktill)
        rader.push(['🗓️ Drickfönster', (d.drinkfran || '?') + '–' + (d.dricktill || '?')]);
      return rader
        .map(([etikett, text]) =>
          `<p><span class="analys-etikett">${etikett}</span>${h(text)}</p>`)
        .join('');
    }

    // Skalar och komprimerar en bild via Canvas API
    // Returnerar ett Promise med base64-strängen (utan data:-prefix)
    function skalaOchKodera(fil, maxPx, kvalitet) {
      return new Promise((resolve, reject) => {
        const img    = new Image();
        const objUrl = URL.createObjectURL(fil);

        img.onerror = () => { URL.revokeObjectURL(objUrl); reject(new Error('Bilden kunde inte laddas')); };

        img.onload = () => {
          URL.revokeObjectURL(objUrl);

          // Beräkna nytt mått med bibehållen proportion
          let w = img.naturalWidth;
          let h = img.naturalHeight;
          if (w > maxPx || h > maxPx) {
            if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
            else        { w = Math.round(w * maxPx / h); h = maxPx; }
          }

          const canvas    = document.createElement('canvas');
          canvas.width    = w;
          canvas.height   = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          // Hämta base64 utan "data:image/jpeg;base64,"-prefixet
          const dataUrl = canvas.toDataURL('image/jpeg', kvalitet);
          resolve(dataUrl.split(',')[1]);
        };

        img.src = objUrl;
      });
    }

    function vinkylenSvgKort(sok) {
      const platsNamn = 'Vinkylen';

      const totalFlaskor = viner
        .filter(v => (v.hyllplats || '').startsWith(platsNamn))
        .reduce((s, v) => s + (v.antal || 0), 0);

      // Viner exakt på given hyllplats
      function hyllViner(zon, nr) {
        const str = `${platsNamn} · ${zon} · Hylla ${nr}`;
        return viner.filter(v => v.hyllplats === str);
      }

      // Glasfärger per typ (flaskbotten sedd rakt framifrån)
      const glasYttre = {
        rött: '#1a0408', vitt: '#18280a', mousserande: '#061208',
        rosé: '#2e0e1a', sött: '#241008'
      };
      const glasInre = {
        rött: '#5a1428', vitt: '#3a5c0e', mousserande: '#0e2c10',
        rosé: '#7a2a48', sött: '#5a2c0c'
      };
      const glasPunt = {
        rött: '#0d0206', vitt: '#0c1604', mousserande: '#030804',
        rosé: '#18080e', sött: '#120804'
      };

      // Y-position för ovansidan av varje hylla
      const vittY = [72, 105, 138];
      const rottY = [200, 231, 262, 293, 324, 355, 386, 417];

      const r = 11;  // Flaskbottens radie i px

      // Rita 7 flaskbottnar (cirklar) per hylla – tomma platser visas som konturer
      function flaskorSvg(zon, nr, sy) {
        let s = '';
        const vinLista = hyllViner(zon, nr);
        const cy = sy - 14;   // Centrum Y: 14px ovanför hyllans ovansida

        for (let slot = 0; slot < 7; slot++) {
          const cx = 25 + slot * 25;   // Jämna 25px-steg: 25,50,75,100,125,150,175
          const v  = vinLista[slot];

          if (!v) {
            // Tom plats – diskret konturcirkel
            s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a2a2a" stroke-width="0.7" opacity="0.55"/>`;
            s += `<circle cx="${cx}" cy="${cy}" r="2.2" fill="none" stroke="#252525" stroke-width="0.5" opacity="0.4"/>`;
          } else {
            const ds       = drinkStatus(v);
            const sokMatch = sok ? matcherSok(v, sok) : null;
            const opac     = sokMatch === false ? 0.14 : 1;
            const oc       = glasYttre[v.typ] || '#181818';
            const ic       = glasInre[v.typ]  || '#303030';
            const pc       = glasPunt[v.typ]  || '#0a0a0a';
            const tip      = h(v.namn) + (v.arsgang ? ' ' + v.arsgang : '') + (v.antal !== 1 ? ' ×' + v.antal : '');

            // Glöd för drickfönsterstatus
            if (ds === 'snart')
              s += `<circle cx="${cx}" cy="${cy}" r="${r + 3}" fill="rgba(255,185,0,0.22)"/>`;
            else if (ds === 'passerat')
              s += `<circle cx="${cx}" cy="${cy}" r="${r + 3}" fill="rgba(190,50,50,0.22)"/>`;

            // Yttre mörk glasring (klickbar)
            s += `<circle class="vk-flaska" cx="${cx}" cy="${cy}" r="${r}" fill="${oc}" opacity="${opac}" onclick="oppnaRedigera('${h(v.id)}')" style="cursor:pointer"><title>${tip}</title></circle>`;
            // Inre vinglans
            s += `<circle cx="${cx}" cy="${cy}" r="${r - 2}" fill="${ic}" opacity="${opac}" pointer-events="none"/>`;
            // Tunn glasväggsglans
            s += `<circle cx="${cx}" cy="${cy}" r="${r - 1}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" opacity="${opac}" pointer-events="none"/>`;
            // Punt – den insjunkna punkten i flaskbottens mitt
            s += `<circle cx="${cx}" cy="${cy}" r="2.8" fill="${pc}" opacity="${+(opac * 0.85).toFixed(2)}" pointer-events="none"/>`;
            // Svag ring runt punten
            s += `<circle cx="${cx}" cy="${cy}" r="3.6" fill="none" stroke="${oc}" stroke-width="0.7" opacity="${+(opac * 0.6).toFixed(2)}" pointer-events="none"/>`;
            // Ljusreflex uppåt till vänster
            s += `<ellipse cx="${+(cx - 2.8).toFixed(1)}" cy="${cy - 4.2}" rx="2.2" ry="1.2" fill="rgba(255,255,255,0.32)" opacity="${opac}" pointer-events="none"/>`;
            // Sekundär svag reflex nedtill
            s += `<ellipse cx="${+(cx + 4).toFixed(1)}" cy="${cy + 5.5}" rx="1.5" ry="0.7" fill="rgba(255,255,255,0.12)" opacity="${opac}" pointer-events="none"/>`;

            // Felzon-markering
            if (felZon(v))
              s += `<circle cx="${+(cx + 6.5).toFixed(1)}" cy="${cy - 6.5}" r="2.5" fill="#b09000" opacity="0.9" pointer-events="none"/>`;

            // Sökhighlight-ring
            if (sokMatch)
              s += `<circle cx="${cx}" cy="${cy}" r="${r + 1}" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2" pointer-events="none"/>`;
          }
        }

        return s;
      }

      // Samla alla flaskor

             + `<line x1="14" y1="${y+4.5}" x2="186" y2="${y+4.5}" stroke="#7a5020" stroke-width="0.4" opacity="0.5"/>`;
