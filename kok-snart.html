<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Köket – Pers Kök & Vinkällare</title>
  <style>
    /* Mörkt tema per CLAUDE.md */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .ikon { font-size: 5rem; margin-bottom: 1.25rem; }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .ingress {
      color: #777;
      font-size: 0.95rem;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .etapp {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #7a5f14;
      background: rgba(122, 95, 20, 0.15);
      border: 1px solid #7a5f14;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 2.5rem;
    }

    .tillbaka {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.75rem;
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 14px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tillbaka:hover { background: #242424; }
    .tillbaka:active { background: #2a2a2a; }
  </style>
</head>
<body>
  <div class="ikon">🍳</div>
  <h1>Köket</h1>
  <p class="ingress">Sous vide-dagbok med 45 migrerade körningar, temperaturguide, receptbank och AI-kock – byggs i Etapp 3.</p>
  <span class="etapp">Etapp 3</span>
  <a href="hub.html" class="tillbaka">← Tillbaka till startsidan</a>
</body>
</html>
