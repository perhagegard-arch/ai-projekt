<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pers Kök">
  <meta name="theme-color" content="#1c1506">
  <title>Köket – Pers Kök & Vinkällare</title>
  <style>
    /* Mörkt tema per CLAUDE.md */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-emblem {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 50%;
    }

    .header-titel { font-size: 1.05rem; font-weight: 700; flex: 1; }

    .tillbaka {
      color: #888;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid #333;
      border-radius: 8px;
      white-space: nowrap;
      transition: color 0.12s, border-color 0.12s;
    }

    .tillbaka:hover { color: #e0e0e0; border-color: #555; }

    /* ── Stämningsbild-hero ─────────────────────────────────────── */
    .kok-hero {
      position: relative;
      width: 100%;
      padding: 3.5rem 1rem 5rem;
      background-image: url('bilder/piemonte.jpg');
      background-size: cover;
      background-position: center 50%;
      text-align: center;
    }

    /* Desktop: piemonte.jpg är liggande (1800×1350) – på bred skärm
       beskärs bilden vertikalt; 50% visar personerna + undre vinlandskapet */
    @media (min-width: 768px) {
      .kok-hero {
        padding: 5rem 1rem 7rem;
        background-position: center 50%;
      }
    }

    .kok-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.10) 0%, rgba(18,18,18,0.65) 60%, #121212 100%);
      pointer-events: none;
      z-index: 0;
    }

    .kok-hero h1 {
      position: relative;
      z-index: 1;
      font-size: 1.8rem;
      font-weight: 700;
      color: #f5ede0;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    /* ── Innehåll ── */
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    /* ── Köksanden: förslagsruta ── */
    .koksan-kort {
      background: #161410;
      border: 1px solid #3a2e10;
      border-radius: 14px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
    }

    .koksan-ikon { font-size: 1.05rem; flex-shrink: 0; margin-top: 0.1rem; }

    .koksan-kropp { flex: 1; min-width: 0; }

    .koksan-rubrik {
      font-size: 0.62rem;
      font-weight: 700;
      color: #7a5a20;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .koksan-tips {
      font-size: 0.83rem;
      color: #b8a060;
      line-height: 1.5;
    }

    .koksan-nav {
      flex-shrink: 0;
      background: none;
      border: 1px solid #3a2a10;
      border-radius: 8px;
      color: #5a4a20;
      font-size: 0.9rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      align-self: center;
      transition: color 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .koksan-nav:hover { color: #d4a84b; border-color: #7a5a1a; }

    /* ── Primärkort: Planera middag ── */
    .planera-kort {
      background: linear-gradient(160deg, #1e1a0a, #161410);
      border: 1px solid #4a3a10;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .kort-titelrad {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .kort-ikon  { font-size: 1.5rem; }
    .kort-namn  { font-size: 1.1rem; font-weight: 700; color: #e8d090; }

    /* ── Formulärsektioner ── */
    .formsektion { margin-bottom: 1.25rem; }

    .sektion-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }

    .pill-rad { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* Toggle-pills */
    .toggle-pill {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      color: #777;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .toggle-pill.aktiv { background: #2e2410; border-color: #7a5a1a; color: #d4a84b; }

    /* Radio-pills */
    .radio-pill {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      color: #777;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .radio-pill.aktiv { background: #2e2410; border-color: #7a5a1a; color: #d4a84b; }

    /* ── Inline-väljare (frys / vin) ── */
    .inline-valjare {
      margin-top: 0.75rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }

    .inline-valjare.synlig { display: block; }

    /* Räknarrad ovanför sökrutan */
    .valjare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.85rem;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      font-size: 0.7rem;
      color: #4a4a4a;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .valjare-header-antal { color: #3a3a3a; }

    .valjare-sok {
      width: 100%;
      padding: 0.6rem 0.85rem;
      background: #1a1a1a;
      border: none;
      border-bottom: 1px solid #222;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    .valjare-sok::placeholder { color: #3a3a3a; }

    /* Omsluter listan + fade-gradient */
    .valjare-lista-wrap { position: relative; }

    .valjare-lista-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: linear-gradient(to bottom, transparent, #141414);
      pointer-events: none;
    }

    .valjare-lista {
      max-height: 240px;
      overflow-y: auto;
    }

    .valjare-item {
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: #aaa;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.1s;
    }

    .valjare-item:last-child { border-bottom: none; }
    .valjare-item:hover      { background: #1e1e1e; }

    /* Vald: guld vänsterkant */
    .valjare-item.vald {
      background: #2e2410;
      color: #d4a84b;
      border-left: 3px solid #7a5a1a;
      padding-left: calc(0.85rem - 3px);
    }

    .valjare-item.vald .valjare-meta { color: #8a6a20; }

    /* Ät snart: röd vänsterkant (om ej vald) */
    .valjare-item.snart:not(.vald) {
      border-left: 3px solid #7a2a2a;
      padding-left: calc(0.85rem - 3px);
    }

    /* Drick snart: guld vänsterkant (om ej vald) */
    .valjare-item.drick-snart:not(.vald) {
      border-left: 3px solid #8a6a10;
      padding-left: calc(0.85rem - 3px);
    }

    /* Vinfärg-kanter via data-attribut (om ej vald) */
    .valjare-item[data-vintyp="rod"]:not(.vald)         { border-left: 3px solid #7a1a2a; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-vintyp="vit"]:not(.vald)         { border-left: 3px solid #5a7a10; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-vintyp="mousserande"]:not(.vald) { border-left: 3px solid #8a7a10; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-vintyp="rose"]:not(.vald)        { border-left: 3px solid #8a3050; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-vintyp="sott"]:not(.vald)        { border-left: 3px solid #6a4a10; padding-left: calc(0.85rem - 3px); }

    /* Fryskategori-kanter (om ej vald och ej snart) */
    .valjare-item[data-kat="kott"]:not(.vald):not(.snart)  { border-left: 3px solid #5a2a1a; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-kat="fisk"]:not(.vald):not(.snart)  { border-left: 3px solid #1a4a6a; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-kat="fagel"]:not(.vald):not(.snart) { border-left: 3px solid #4a4a1a; padding-left: calc(0.85rem - 3px); }
    .valjare-item[data-kat="gront"]:not(.vald):not(.snart) { border-left: 3px solid #2a5a2a; padding-left: calc(0.85rem - 3px); }

    /* Snabbfilter-rad (horisontellt scrollbar) */
    .valjare-filter-rad {
      display: flex;
      gap: 0.35rem;
      padding: 0.5rem 0.75rem;
      background: #161616;
      border-bottom: 1px solid #1e1e1e;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .valjare-filter-rad::-webkit-scrollbar { display: none; }

    .valjare-fpill {
      flex-shrink: 0;
      padding: 0.28rem 0.65rem;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #555;
      font-size: 0.7rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .valjare-fpill:hover { color: #999; border-color: #3a3a3a; }
    .valjare-fpill.aktiv { background: #2e2410; border-color: #7a5a1a; color: #d4a84b; }

    /* Sektionsrubrik (gruppnamn inuti listan) */
    .valjare-sektion-rubrik {
      padding: 0.38rem 0.85rem;
      font-size: 0.65rem;
      font-weight: 700;
      color: #4a4a4a;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: #111;
      border-bottom: 1px solid #1a1a1a;
    }

    .valjare-meta { font-size: 0.72rem; color: #555; }

    /* ÄT NU-badge (röd) */
    .snart-badge {
      font-size: 0.58rem;
      font-weight: 700;
      background: #4a1f1f;
      color: #e07070;
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      margin-left: 0.4rem;
      letter-spacing: 0.04em;
      vertical-align: middle;
    }

    /* DRICK NU-badge (guld) */
    .drick-badge {
      font-size: 0.58rem;
      font-weight: 700;
      background: #2a1e05;
      color: #d4a84b;
      border: 1px solid #5a4a10;
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      margin-left: 0.4rem;
      letter-spacing: 0.04em;
      vertical-align: middle;
    }

    .valjare-tom {
      padding: 0.85rem;
      font-size: 0.82rem;
      color: #3a3a3a;
      text-align: center;
    }

    /* ── Stepper ── */
    .stepper {
      display: flex;
      align-items: center;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      overflow: hidden;
      width: fit-content;
    }

    .stepper-btn {
      width: 46px;
      height: 46px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .stepper-btn:hover    { color: #d4a84b; background: #2a2010; }
    .stepper-btn:disabled { color: #3a3a3a; cursor: default; background: none; }

    .stepper-tal {
      min-width: 48px;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #e0e0e0;
      padding: 0 0.25rem;
      border-left: 1px solid #2a2a2a;
      border-right: 1px solid #2a2a2a;
      line-height: 46px;
    }

    /* ── Planera-knapp ── */
    .planera-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #7a5a10, #5a3f0a);
      border: none;
      border-radius: 14px;
      color: #f0d878;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .planera-btn:hover   { opacity: 0.88; }
    .planera-btn:active  { transform: scale(0.98); }
    .planera-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* ── Laddningsindikator ── */
    #laddning {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem 1rem;
      text-align: center;
    }

    #laddning.synlig { display: flex; }

    .laddning-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a2a;
      border-top-color: #7a5a1a;
      border-radius: 50%;
      animation: snurra 0.8s linear infinite;
    }

    @keyframes snurra { to { transform: rotate(360deg); } }

    .laddning-text { font-size: 0.88rem; color: #666; line-height: 1.6; }

    /* ── Felruta ── */
    #felruta {
      display: none;
      background: #1e0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #e07070;
      line-height: 1.6;
    }

    #felruta.synlig { display: block; }

    /* ── Resultatsektionen ── */
    #resultat-sektion { display: none; margin-bottom: 1rem; }
    #resultat-sektion.synlig { display: block; }

    .resultat-meta-rad { display: flex; justify-content: center; margin-bottom: 1.25rem; }

    .resultat-meta-chip {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #8a6a20;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: #2a1e08;
      border: 1px solid #4a3a10;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
    }

    /* Markdown-renderat innehåll */
    #resultat-innehall {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      margin-bottom: 1rem;
      line-height: 1.7;
      font-size: 0.88rem;
    }

    #resultat-innehall h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e8d090;
      margin: 1.25rem 0 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #2a2a2a;
    }

    #resultat-innehall h2:first-child { margin-top: 0; }

    #resultat-innehall h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #c8b060;
      margin: 1rem 0 0.4rem;
    }

    #resultat-innehall ul { padding-left: 1.25rem; margin: 0.4rem 0; }
    #resultat-innehall li { margin-bottom: 0.25rem; color: #c0c0c0; }
    #resultat-innehall p  { margin: 0.5rem 0; color: #c0c0c0; }

    #resultat-innehall hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 1.25rem 0;
    }

    #resultat-innehall strong { color: #e0e0e0; }

    /* FRYS-badge */
    .frys-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      background: #0d2a35;
      color: #70c0e0;
      border: 1px solid #1a5f7a;
      border-radius: 6px;
      padding: 0.1rem 0.4rem;
      margin: 0 0.15rem;
      vertical-align: middle;
    }

    /* ── Inköpslista ── */
    .inkop-sektion {
      display: none;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .inkop-sektion.synlig { display: block; }

    .inkop-rubrik {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .inkop-rubrik h3 { font-size: 0.95rem; font-weight: 700; color: #c8b060; }

    .kopiera-btn {
      padding: 0.35rem 0.85rem;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #888;
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }

    .kopiera-btn:hover    { color: #d4a84b; border-color: #5a4a20; }
    .kopiera-btn.kopierat { color: #70c070; border-color: #2a5a2a; }

    .inkop-lista { font-size: 0.85rem; color: #c0c0c0; line-height: 1.7; }

    /* ── Resultatknappar ── */
    .resultat-knappar { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    .resultat-btn {
      flex: 1;
      min-width: 140px;
      padding: 0.7rem 1rem;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .resultat-btn:hover { color: #d4a84b; border-color: #5a4a20; background: #2a1e08; }

    /* ── Sekundär sektion ── */
    .sekundar-sektion { border-top: 1px solid #1e1e1e; padding-top: 1.5rem; }

    .sekundar-rubrik {
      font-size: 0.68rem;
      font-weight: 700;
      color: #3a3a3a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 0.85rem;
    }

    .sekundar-knappar { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }

    .sekundar-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1rem;
      background: #181818;
      border: 1px solid #252525;
      border-radius: 10px;
      color: #555;
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .sekundar-btn:hover { color: #999; border-color: #3a3a3a; background: #1e1e1e; }

    .sekundar-btn.inaktiv { opacity: 0.38; cursor: default; pointer-events: none; }

    /* ── Kockens viskning ── */
    .viskning-wrap { margin: 0.4rem 0 1rem; }

    .viskning-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.45rem 0.8rem;
      background: #1a1a12;
      border: 1px solid #2a2a18;
      border-radius: 10px;
      color: #6a5a28;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .viskning-toggle:hover { background: #1e1e14; border-color: #3a3a18; color: #a08840; }

    .viskning-toggle.oppet {
      background: #1e1a0a;
      border-color: #4a3a10;
      color: #c8a040;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .viskning-pil { margin-left: auto; transition: transform 0.15s; }
    .viskning-toggle.oppet .viskning-pil { transform: rotate(90deg); }

    .viskning-panel {

    .viskning-lage-btn {

<body>

  <header class="header">
    <img src="Logga.png" alt="" class="header-emblem"
         onerror="this.style.display='none'">
    <span class="header-titel">🍽️ Köket</span>
    <a href="index.html" class="tillbaka">← Hemma</a>
  </header>

  <!-- Stämningsbild: taxen i maskrosäng med gradient-overlay -->
  <section class="kok-hero">
    <div class="kok-hero-overlay"></div>
    <h1>Vad vill du laga ikväll?</h1>
  </section>

  <div class="container">

    <!-- Köksanden: smarta datadrivna tips (göms om inga tips finns) -->
    <div class="koksan-kort" id="koksan-kort" style="display:none">
      <span class="koksan-ikon">💡</span>
      <div class="koksan-kropp">
        <div class="koksan-rubrik">Köksanden</div>
        <div class="koksan-tips" id="koksan-tips"></div>
      </div>
      <button class="koksan-nav" id="koksan-nasta" title="Nästa tips">→</button>
    </div>

    <!-- Primärkort: Planera middag -->
    <div class="planera-kort">

      <div class="kort-titelrad">
        <span class="kort-ikon">🍽️</span>
        <span class="kort-namn">Planera middag</span>
      </div>

      <!-- Startpunkt: tre vägar in -->
      <div class="formsektion">
        <div class="sektion-label">Startpunkt</div>
        <div class="pill-rad">
          <button class="radio-pill aktiv" data-start="slump">🎲 Överraska mig</button>
          <button class="radio-pill" data-start="ravara">🥩 Råvara</button>
          <button class="radio-pill" data-start="vin">🍷 Vin</button>
        </div>

        <!-- Frysväljare: visas när "råvara" är vald -->
        <div class="inline-valjare" id="frys-valjare">
          <div class="valjare-header">
            <span id="frys-header-text">🧊 Frysen</span>
            <span class="valjare-header-antal" id="frys-header-antal"></span>
          </div>
          <input type="search" class="valjare-sok" id="frys-sok"
                 placeholder="🔍 Sök i frysen…" autocomplete="off">
          <div class="valjare-filter-rad" id="frys-filter-rad" style="display:none"></div>
          <div class="valjare-lista-wrap">
            <div class="valjare-lista" id="frys-lista"></div>
          </div>
        </div>

        <!-- Vinväljare: visas när "vin" är valt -->
        <div class="inline-valjare" id="vin-valjare">
          <div class="valjare-header">
            <span id="vin-header-text">🍷 Vinkällaren</span>
            <span class="valjare-header-antal" id="vin-header-antal"></span>
          </div>
          <input type="search" class="valjare-sok" id="vin-sok"
                 placeholder="🔍 Sök i vinkällaren…" autocomplete="off">
          <div class="valjare-filter-rad" id="vin-filter-rad" style="display:none"></div>
          <div class="valjare-filter-rad" id="vin-land-rad" style="display:none"></div>
          <div class="valjare-lista-wrap">
            <div class="valjare-lista" id="vin-lista"></div>
          </div>
        </div>
      </div>

      <!-- Rätter -->
      <div class="formsektion">
        <div class="sektion-label">Rätter</div>
        <div class="pill-rad">
          <button class="toggle-pill" data-ratt="forratt">Förrätt</button>
          <button class="toggle-pill aktiv" data-ratt="varmratt">Varmrätt</button>
          <button class="toggle-pill" data-ratt="efterratt">Efterrätt</button>
        </div>
      </div>

      <!-- Tonläge -->
      <div class="formsektion">
        <div class="sektion-label">Tonläge</div>
        <div class="pill-rad">
          <button class="radio-pill aktiv" data-ton="vardag">Vardag</button>
          <button class="radio-pill" data-ton="lite-extra">Lite extra</button>
          <button class="radio-pill" data-ton="full-michelin">Full Michelin</button>
        </div>
      </div>

      <!-- Antal personer -->
      <div class="formsektion">
        <div class="sektion-label">Antal personer</div>
        <div class="stepper">
          <button class="stepper-btn" id="minus-btn">−</button>
          <span class="stepper-tal" id="antal-tal">2</span>
          <button class="stepper-btn" id="plus-btn">＋</button>
        </div>
      </div>

      <button class="planera-btn" id="planera-btn">Planera middag &nbsp;→</button>

    </div><!-- /planera-kort -->

    <!-- Laddningsindikator -->
    <div id="laddning">
      <div class="laddning-spinner"></div>
      <div class="laddning-text"><strong>AI-kocken tänker…</strong><br>Komponerar din meny – vanligtvis 30–60 sekunder.</div>
    </div>

    <!-- Felruta -->
    <div id="felruta"></div>

    <!-- Resultatsektionen -->
    <div id="resultat-sektion">
      <div class="resultat-meta-rad">
        <span class="resultat-meta-chip" id="resultat-meta"></span>
      </div>
      <div id="resultat-innehall"></div>
      <div class="inkop-sektion" id="inkop-sektion">
        <div class="inkop-rubrik">
          <h3>🛒 Inköpslista</h3>
          <button class="kopiera-btn" id="kopiera-btn">📋 Kopiera</button>
        </div>
        <div class="inkop-lista" id="inkop-lista"></div>
      </div>
      <div class="resultat-knappar">
        <button class="resultat-btn" id="nytt-btn">🔄 Ge mig ett annat upplägg</button>
        <button class="resultat-btn" id="spara-btn">📋 Spara i receptbanken</button>
      </div>
    </div>

    <!-- Sekundär sektion -->
    <div class="sekundar-sektion">
      <div class="sekundar-rubrik">Dagbok &amp; recept</div>
      <div class="sekundar-knappar">
        <a href="sousvide-dagbok.html" class="sekundar-btn">🌡️ Sous Vide-dagbok</a>
        <a href="receptbank.html" class="sekundar-btn">📋 Receptbank</a>
        <a href="skafferi.html" class="sekundar-btn">🗄️ Skafferiet</a>
      </div>
    </div>

  </div><!-- /container -->

  <script>
    /* ── State ── */
    let valtaRatter = new Set(['varmratt']);
    let tonlage     = 'vardag';
    let antal       = 2;
    let startVal    = 'slump';
    let valdRavara  = null; // { namn, qty, unit, atSnart }
    let valdVin     = null; // vinobj från vinkallare
    let senastSvar  = '';   // sparat för receptbank

    const RATT_LABEL = { forratt: 'Förrätt', varmratt: 'Varmrätt', efterratt: 'Efterrätt' };
    const TON_LABEL  = { vardag: 'Vardag', 'lite-extra': 'Lite extra', 'full-michelin': 'Full Michelin' };

    /* ── Defensiv fälthantering för frysregister ── */
    function getNamn(v)   { return v.namn || v.name || v.kategori || v.category || 'Okänd vara'; }
    function getQty(v)    { return Number(v.qty) || Number(v.antal) || Number(v.count) || 1; }
    function getUnit(v)   { return v.unit || v.enhet || 'förp.'; }
    function isAtSnart(v) {
      return !!(v.eatSoon || v.eat_soon || v.atSnart || v.at_snart ||
                v.prio === 'snart' || v.priority === 'soon' || v.priority === 'snart');
    }

    /* ── Data från localStorage ── */
    function hamtaFrysdata()   { try { return JSON.parse(localStorage.getItem('frysregister_v1') || '[]'); } catch(e) { return []; } }
    function hamtaVinkallare() { try { return JSON.parse(localStorage.getItem('vinkallare_viner') || '[]'); } catch(e) { return []; } }
    function hamtaSousvide()   { try { return JSON.parse(localStorage.getItem('sousvide_koningar') || '[]'); } catch(e) { return []; } }

    /* ── Vintyp-metadata och normalisering ── */
    const VIN_TYPER = {
      rod:         { emoji: '🍷', label: 'Röda' },
      vit:         { emoji: '🥂', label: 'Vita' },
      mousserande: { emoji: '🍾', label: 'Mousserande' },
      rose:        { emoji: '🌸', label: 'Rosé' },
      sott:        { emoji: '🍯', label: 'Sött' },
    };

    const VIN_TYP_ORDNING = ['rod', 'vit', 'mousserande', 'rose', 'sott'];

    function normaliseraVintyp(typ) {
      const t = (typ || '').toLowerCase().replace(/\s+/g, '');
      /* "rött" (neutrum) och "röd/röda" ska båda ge 'rod' */
      if (/^r[öo][dt]|^red/.test(t))                               return 'rod';
      if (/^vi[t]|^white/.test(t))                                  return 'vit';
      if (/^(mous|bubb|cham|pros|cava|sekt|friz|spark)/.test(t))   return 'mousserande';
      if (/^ros[eé]?$/.test(t))                                     return 'rose';
      if (/^(s[öo]t|des|port|sher|lik[öo]r)/.test(t))              return 'sott';
      return '';
    }

    /* ── Fryskategori-metadata och normalisering ── */
    const FRYS_KAT_META = {
      kott:   { emoji: '🥩', label: 'Kött & Vilt' },
      fisk:   { emoji: '🐟', label: 'Fisk & Skaldjur' },
      fagel:  { emoji: '🐓', label: 'Fågel' },
      gront:  { emoji: '🥦', label: 'Grönt & Övrigt' },
      ovrigt: { emoji: '📦', label: 'Övrigt' },
    };

    const FRYS_KAT_ORDNING = ['kott', 'fisk', 'fagel', 'gront', 'ovrigt'];

    function normaliseraFrysKat(v) {
      /* Explicit kategori-fält prioriteras, annars gissning från namnet */
      const explicit =
        v.grupp || v.kat ||
        (v.namn  && v.kategori  ? v.kategori  : null) ||
        (v.name  && v.category  ? v.category  : null) || '';
      const text = (explicit || getNamn(v)).toLowerCase();

      if (/k[öo]tt|vilt|lamm|nöt|gris|älg|rådjur|vildsvin|hjort|fläsk|biff|köttfärs|rens|rensdj/.test(text)) return 'kott';
      if (/fisk|lax|torsk|räk|skaldjur|abborre|gädda|[öo]ring|röding|sej|makrill/.test(text))                  return 'fisk';
      if (/kyckling|fågel|anka|kalkon|h[öo]ns|duva/.test(text))                                                 return 'fagel';
      if (/gröns|spenat|morot|l[öo]k|potatis|bär|frukt|svamp|br[öo]d|pasta/.test(text))                        return 'gront';
      return 'ovrigt';
    }

    /* Filter-state för väljarna */
    let vinTypFilter  = 'alla';
    let vinLandFilter = 'alla';
    let frysKatFilter = 'alla';

    /* ── Hjälp: om ett vin är nära slutet av drickfönstret ── */
    function isDrickSnart(v) {
      const till = v.dricktill || v.drinkTill || v.drinkfran_till;
      if (!till) return false;
      let tillDatum;
      if (/^\d{4}$/.test(String(till))) {
        /* Bara ett år angivet – sätt till sista december */
        tillDatum = new Date(Number(till), 11, 31);
      } else {
        tillDatum = new Date(till);
      }
      if (isNaN(tillDatum)) return false;
      const dagarKvar = (tillDatum - new Date()) / 86400000;
      return dagarKvar >= 0 && dagarKvar <= 120;
    }

    /* ── Bygg frysväljare med kategorigrupper ── */
    function byggFryslista(sok) {
      const varor     = hamtaFrysdata();
      const filter    = (sok || '').toLowerCase().trim();
      const lista     = document.getElementById('frys-lista');
      const filterRad = document.getElementById('frys-filter-rad');

      /* Räkna varor per kategori (för filterpills) */
      const perKat = {};
      varor.forEach(v => {
        const k = normaliseraFrysKat(v);
        perKat[k] = (perKat[k] || 0) + 1;
      });

      /* Bygg filterpills om fler än en kategori finns */
      const befintligaKat = FRYS_KAT_ORDNING.filter(k => perKat[k]);
      filterRad.innerHTML = '';
      if (befintligaKat.length > 1) {
        filterRad.style.display = '';
        const allaBtn = document.createElement('button');
        allaBtn.className = 'valjare-fpill' + (frysKatFilter === 'alla' ? ' aktiv' : '');
        allaBtn.textContent = `Alla · ${varor.length}`;
        allaBtn.addEventListener('click', () => {
          frysKatFilter = 'alla';
          byggFryslista(document.getElementById('frys-sok').value);
        });
        filterRad.appendChild(allaBtn);

        befintligaKat.forEach(k => {
          const meta = FRYS_KAT_META[k];
          const btn  = document.createElement('button');
          btn.className = 'valjare-fpill' + (frysKatFilter === k ? ' aktiv' : '');
          btn.textContent = `${meta.emoji} ${meta.label} · ${perKat[k]}`;
          btn.addEventListener('click', () => {
            frysKatFilter = k;
            byggFryslista(document.getElementById('frys-sok').value);
          });
          filterRad.appendChild(btn);
        });
      } else {
        filterRad.style.display = 'none';
      }

      /* Filtrera på sökning + aktiv kategori */
      const matchade = varor.filter(v => {
        const namn     = getNamn(v).toLowerCase();
        const textOk   = !filter || namn.includes(filter);
        const katOk    = frysKatFilter === 'alla' || normaliseraFrysKat(v) === frysKatFilter;
        return textOk && katOk;
      });

      /* Räknare i header */
      document.getElementById('frys-header-antal').textContent =
        (filter || frysKatFilter !== 'alla')
          ? `${matchade.length} av ${varor.length}`
          : `${varor.length} varor`;

      if (!matchade.length) {
        lista.innerHTML = '<div class="valjare-tom">Inga varor hittades</div>';
        return;
      }

      /* Gruppera per kategori – ät-snart alltid högst upp */
      const snartVaror = matchade.filter(isAtSnart);
      const ovrigaVaror = matchade.filter(v => !isAtSnart(v));

      const grupper = {};
      ovrigaVaror.forEach(v => {
        const k = normaliseraFrysKat(v);
        if (!grupper[k]) grupper[k] = [];
        grupper[k].push(v);
      });

      let html = '';

      /* Ät-snart-sektion allra överst om sådana varor finns (och inte katfilter aktivt) */
      if (snartVaror.length && frysKatFilter === 'alla') {
        html += `<div class="valjare-sektion-rubrik">⚠️ Äts snart · ${snartVaror.length}</div>`;
        snartVaror.forEach(v => { html += frysItemHtml(v); });
      }

      /* Kategorisektioner */
      const visaGrupper = befintligaKat.length > 1;
      FRYS_KAT_ORDNING.forEach(k => {
        const gr = grupper[k];
        if (!gr || !gr.length) return;
        if (visaGrupper) {
          const meta = FRYS_KAT_META[k];
          html += `<div class="valjare-sektion-rubrik">${meta.emoji} ${meta.label} · ${gr.length}</div>`;
        }
        gr.forEach(v => { html += frysItemHtml(v); });
      });

      /* Om katfilter är aktivt, visa snart-varor i filtrad grupp också */
      if (frysKatFilter !== 'alla') {
        snartVaror.forEach(v => { html += frysItemHtml(v); });
      }

      lista.innerHTML = html;

      lista.querySelectorAll('.valjare-item').forEach(el => {
        el.addEventListener('click', () => {
          const namn  = el.dataset.namn;
          const snart = el.dataset.snart === 'true';
          if (valdRavara && valdRavara.namn === namn) {
            valdRavara = null;
          } else {
            valdRavara = { namn, qty: Number(el.dataset.qty), unit: el.dataset.unit, atSnart: snart };
          }
          byggFryslista(document.getElementById('frys-sok').value);
        });
      });
    }

    function frysItemHtml(v) {
      const namn   = getNamn(v);
      const qty    = getQty(v);
      const unit   = getUnit(v);
      const snart  = isAtSnart(v);
      const valdNu = valdRavara && valdRavara.namn === namn;
      const kat    = normaliseraFrysKat(v);

      const snartBadge = snart ? '<span class="snart-badge">ÄT NU</span>' : '';
      const klasser    = ['valjare-item', snart ? 'snart' : '', valdNu ? 'vald' : ''].filter(Boolean).join(' ');

      return `<div class="${klasser}" data-namn="${escHtml(namn)}" data-qty="${qty}" data-unit="${escHtml(unit)}" data-snart="${snart}" data-kat="${kat}">
        <span>${escHtml(namn)}${snartBadge}</span>
        <span class="valjare-meta">${qty} ${escHtml(unit)}</span>
      </div>`;
    }

    /* ── Bygg vinväljare med typ- och landgrupper ── */
    function byggVinlista(sok) {
      const viner     = hamtaVinkallare();
      const filter    = (sok || '').toLowerCase().trim();
      const lista     = document.getElementById('vin-lista');
      const filterRad = document.getElementById('vin-filter-rad');
      const landRad   = document.getElementById('vin-land-rad');

      const tillgangliga  = viner.filter(v => (Number(v.antal) || 0) > 0);
      const totalFlaskor  = tillgangliga.reduce((s, v) => s + (Number(v.antal) || 1), 0);

      /* ── Rad 1: TYP-filter (räknat på hela källaren) ── */
      const perTyp = {};
      tillgangliga.forEach(v => {
        const t = normaliseraVintyp(v.typ) || 'okand';
        perTyp[t] = (perTyp[t] || 0) + (Number(v.antal) || 1);
      });
      const befintligaTyper = VIN_TYP_ORDNING.filter(t => perTyp[t]);

      filterRad.innerHTML = '';
      if (befintligaTyper.length > 1) {
        filterRad.style.display = '';
        byggFilterPill(filterRad, `Alla · ${totalFlaskor}`, vinTypFilter === 'alla', () => {
          vinTypFilter = 'alla'; byggVinlista(document.getElementById('vin-sok').value);
        });
        befintligaTyper.forEach(t => {
          const meta = VIN_TYPER[t];
          byggFilterPill(filterRad, `${meta.emoji} ${meta.label} · ${perTyp[t]}`, vinTypFilter === t, () => {
            vinTypFilter = t; byggVinlista(document.getElementById('vin-sok').value);
          });
        });
      } else {
        filterRad.style.display = 'none';
      }

      /* ── Rad 2: LAND-filter (räknat på typ-filtrerad mängd) ── */
      const typFilterad = tillgangliga.filter(v =>
        vinTypFilter === 'alla' || normaliseraVintyp(v.typ) === vinTypFilter
      );
      const perLand = {};
      typFilterad.forEach(v => {
        const l = (v.land || '').trim();
        if (l) perLand[l] = (perLand[l] || 0) + (Number(v.antal) || 1);
      });
      /* Sortera länder på flaskantal, visa max 7 */
      const landerSorterade = Object.entries(perLand)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 7)
        .map(([land]) => land);

      landRad.innerHTML = '';
      if (landerSorterade.length > 1) {
        landRad.style.display = '';
        byggFilterPill(landRad, 'Alla länder', vinLandFilter === 'alla', () => {
          vinLandFilter = 'alla'; byggVinlista(document.getElementById('vin-sok').value);
        });
        landerSorterade.forEach(land => {
          byggFilterPill(landRad, `${land} · ${perLand[land]}`, vinLandFilter === land, () => {
            vinLandFilter = land; byggVinlista(document.getElementById('vin-sok').value);
          });
        });
      } else {
        landRad.style.display = 'none';
        /* Om landet vi filtrerade på försvann (bytte typ-filter) → återställ */
        if (vinLandFilter !== 'alla' && !landerSorterade.includes(vinLandFilter)) {
          vinLandFilter = 'alla';
        }
      }

      /* ── Filtrering: sökning + typ + land (AND) ── */
      const matchade = tillgangliga.filter(v => {
        const text   = [v.namn, v.druva, v.land, v.region, v.typ].join(' ').toLowerCase();
        const textOk = !filter || text.includes(filter);
        const typOk  = vinTypFilter === 'alla' || normaliseraVintyp(v.typ) === vinTypFilter;
        const landOk = vinLandFilter === 'alla' || (v.land || '').trim() === vinLandFilter;
        return textOk && typOk && landOk;
      });

      /* ── Header-räknare ── */
      const matchadeFlaskor = matchade.reduce((s, v) => s + (Number(v.antal) || 1), 0);
      const aktivFilter     = filter || vinTypFilter !== 'alla' || vinLandFilter !== 'alla';
      document.getElementById('vin-header-antal').textContent =
        aktivFilter ? `${matchadeFlaskor} av ${totalFlaskor} fl` : `${totalFlaskor} fl`;

      if (!matchade.length) {
        lista.innerHTML = '<div class="valjare-tom">Inga viner matchar</div>';
        return;
      }

      /* ── Gruppera per typ och rendera ── */
      const grupper = {};
      matchade.forEach(v => {
        const t = normaliseraVintyp(v.typ) || 'okand';
        if (!grupper[t]) grupper[t] = [];
        grupper[t].push(v);
      });

      /* Sektionsrubriker bara när fler typer finns bland resultaten och inget typfilter är aktivt */
      const visaGrupper = Object.keys(grupper).length > 1 && vinTypFilter === 'alla';

      let html = '';
      [...VIN_TYP_ORDNING, 'okand'].forEach(t => {
        const gr = grupper[t];
        if (!gr || !gr.length) return;

        if (visaGrupper) {
          const meta  = VIN_TYPER[t] || { emoji: '🍶', label: 'Övriga' };
          const total = gr.reduce((s, v) => s + (Number(v.antal) || 1), 0);
          html += `<div class="valjare-sektion-rubrik">${meta.emoji} ${meta.label} · ${total}</div>`;
        }

        gr.sort((a, b) => (isDrickSnart(b) ? 1 : 0) - (isDrickSnart(a) ? 1 : 0));

        gr.forEach(v => {
          const valdNu     = valdVin && String(valdVin.id || valdVin.namn) === String(v.id || v.namn);
          const drSnart    = isDrickSnart(v);
          const etik       = [v.namn, v.årgång || v.argarg || ''].filter(Boolean).join(' ');
          const detalj     = [v.druva, v.land].filter(Boolean).join(' · ');
          const drickBadge = drSnart ? '<span class="drick-badge">DRICK NU</span>' : '';
          const klasser    = ['valjare-item', drSnart ? 'drick-snart' : '', valdNu ? 'vald' : ''].filter(Boolean).join(' ');
          const normTyp    = normaliseraVintyp(v.typ);

          html += `<div class="${klasser}" data-id="${escHtml(String(v.id || v.namn))}" data-vintyp="${normTyp}">
            <span>${escHtml(etik)}${drickBadge}</span>
            <span class="valjare-meta">${escHtml(detalj)} · ${v.antal} fl</span>
          </div>`;
        });
      });

      lista.innerHTML = html;

      lista.querySelectorAll('.valjare-item').forEach(el => {
        el.addEventListener('click', () => {
          const id     = el.dataset.id;

          byggVinlista(document.getElementById('vin-sok').value);

    /* ══════════════════════════════════════════
       KÖKSANDEN – smarta tips utan AI-anrop
       ══════════════════════════════════════════ */

    function genereraKoksTips() {
      const tips = [];
      const idag = new Date();

      /* 1. Frys: varor märkta som ät-snart */
      const frysVaror   = hamtaFrysdata();
      const snartVaror  = frysVaror.filter(isAtSnart);
      if (snartVaror.length) {
        const namn = snartVaror.slice(0, 2).map(v => getNamn(v));
        if (namn.length === 1) {
          tips.push(`${namn[0]} i frysen bör ätas snart – perfekt tillfälle att planera en middag kring det.`);
        } else {
          tips.push(`${namn[0]} och ${namn[1]} i frysen bör ätas snart – passa på nu.`);
        }
      }

      /* 2. Vin: nära slutet av drickfönstret (inom 120 dagar) */
      const viner         = hamtaVinkallare().filter(v => (Number(v.antal) || 0) > 0);
      const drickSnartVin = viner.find(isDrickSnart);
      if (drickSnartVin) {
        const ar = drickSnartVin.årgång || drickSnartVin.argarg || '';
        tips.push(`Din ${drickSnartVin.namn || 'vinkällarvinet'}${ar ? ' ' + ar : ''} är inom sitt drickfönster – passa på att njuta av den nu.`);
      }

      /* 3. Sous vide-historik: kategori inte lagad på >45 dagar */
      const svKorningar = hamtaSousvide();
      if (svKorningar.length) {
        const senastePerKat = {};
        svKorningar.forEach(k => {
          const kat   = (k.kat || k.kategori || '').trim();
          const datum = k.datum ? new Date(k.datum) : null;
          if (!kat || !datum || isNaN(datum)) return;
          if (!senastePerKat[kat] || datum > senastePerKat[kat]) {
            senastePerKat[kat] = datum;
          }
        });

        /* Äldst lagad kategori, minst 45 dagar sedan */
        const gamlaKat = Object.entries(senastePerKat)
          .filter(([, d]) => (idag - d) / 86400000 > 45)
          .sort((a, b) => a[1] - b[1]);

        if (gamlaKat.length) {
          const [kat, datum] = gamlaKat[0];
          const veckor = Math.round((idag - datum) / (86400000 * 7));
          tips.push(`Det är ${veckor} veckor sedan du sous vide-lagade ${kat.toLowerCase()} senast – kanske dags igen?`);
        }
      }

      return tips;
    }

    /* ── Markdown-renderer med [FRYS]-stöd ── */
    function formatInline(text) {
      text = text.replace(/\[FRYS\]/g, '<span class="frys-badge">🧊 FRYS</span>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.+?)\*/g,     '<em>$1</em>');
      return text;
    }

    function renderMarkdown(md) {
      const rader = md.split('\n');
      let html   = '';
      let iLista = false;

      for (let i = 0; i < rader.length; i++) {
        const rad = rader[i];

        if (rad.match(/^---+$/)) {
          if (iLista) { html += '</ul>'; iLista = false; }
          html += '<hr>'; continue;
        }
        if (rad.startsWith('## ')) {
          if (iLista) { html += '</ul>'; iLista = false; }
          html += `<h2>${formatInline(rad.slice(3).trim())}</h2>`; continue;
        }
        if (rad.startsWith('### ')) {
          if (iLista) { html += '</ul>'; iLista = false; }
          html += `<h3>${formatInline(rad.slice(4).trim())}</h3>`; continue;
        }
        if (rad.match(/^[-*] /)) {
          if (!iLista) { html += '<ul>'; iLista = true; }
          html += `<li>${formatInline(rad.slice(2).trim())}</li>`; continue;
        }
        if (iLista) { html += '</ul>'; iLista = false; }
        const trimad = rad.trim();
        if (trimad) html += `<p>${formatInline(trimad)}</p>`;
      }

      if (iLista) html += '</ul>';
      return html;
    }

    /* ── Extrahera inköpslista ── */
    function extraherapInkoplista(text) {
      const match = text.match(/##\s*(?:Inköpslista|Inkopslista)\s*\n([\s\S]+?)(?=\n##|$)/i);
      if (!match) return null;
      const rader = match[1].split('\n')
        .map(r => r.trim())
        .filter(r => r.match(/^[-*]/))
        .map(r => r.replace(/^[-*]\s*/, '').trim())
        .filter(Boolean);
      return rader.length ? rader : null;
    }

       KOCKENS VISKNING

    /* Delar upp raw markdown på ### rubriker – en post per rätt */
    function extraherapRatter(text) {
      return text.split(/(?=^### )/m)
        .filter(d => d.startsWith('### '))
        .map(d => {
          const m = d.match(/^### (.+)/);
          return { namn: m ? m[1].trim() : 'Rätten', text: d.trim() };
        });
    }

    /* Anropar Claude för ett viskning-läge */
    async function anropaViskning(idx, lage, rattNamn, rattText, alternativt) {
      const svarEl = document.getElementById(`viskning-svar-${idx}`);
      const merBtn = document.getElementById(`viskning-mer-${idx}`);
      svarEl.innerHTML = '<span class="viskning-spinner"></span> Kocken tänker…';
      merBtn.style.display = 'none';

      const frysText = hamtaFrysdata().length
        ? hamtaFrysdata().map(v => `${getNamn(v)} (${getQty(v)} ${getUnit(v)})`).join(', ')
        : '(tomt)';

      let prompt;
      if (lage === 'varfor') {
        prompt = `Du är en Michelin-kock som viskar råd bredvid hemkocken. Förklara VARFÖR ett centralt och intressant steg eller val i just den här rätten görs – specifikt för det här receptet, inte generellt. 2–3 meningar. Varm, pedagogisk ton.

Rätt: ${rattNamn}

${rattText}`;
      } else if (lage === 'vaga') {
        prompt = `Du är en uppmuntrande Michelin-kock som vill inspirera hemkocken att våga lämna receptet. Ge ETT konkret och spännande förslag på hur man kan avvika från receptet ikväll – ofarligt men djärvt. Koppla gärna till frysens innehåll om det tillför något. Uppmuntrande, varm ton – inga varningar, bara inspiration. 2–3 meningar, ett enda förslag.${alternativt ? '\nGe ett ANNAT förslag än tidigare.' : ''}

Frysens innehåll: ${frysText}

Rätt: ${rattNamn}

${rattText}`;
      } else {
        prompt = `Du är en Michelin-kock som lär ut köksteknik. Ge en konkret kökstekniklärdom direkt relevant för den här rätten – syra/salt/fett/umami, bryning, att vila kött, reducera eller annat. Specifikt för den här rätten och dess ingredienser, inte generellt. 2–4 meningar.

Rätt: ${rattNamn}

${rattText}`;
      }

      try {
        let apiNyckel = localStorage.getItem('frysregister_apikey_v1') || '';
        if (!apiNyckel) {
          apiNyckel = (window.prompt('Klistra in din Anthropic API-nyckel:') || '').trim();
          if (!apiNyckel) throw new Error('Ingen API-nyckel angiven.');
          localStorage.setItem('frysregister_apikey_v1', apiNyckel);
        }

        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiNyckel,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 500,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!resp.ok) {
          const fel = await resp.text();
          if (resp.status === 401) localStorage.removeItem('frysregister_apikey_v1');
          throw new Error(`API-fel ${resp.status}: ${fel.slice(0, 200)}`);
        }

        const svar  = await resp.json();
        const block = (svar.content || []).find(b => b.type === 'text');
        if (!block?.text) throw new Error('Tomt svar från Claude.');
        const text = block.text.replace(/^```[^\n]*\n?/, '').replace(/\n?```$/, '').trim();

        svarEl.innerHTML = text.split('\n').filter(r => r.trim())
          .map(r => `<p>${r.trim().replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`)
          .join('');

        if (lage === 'vaga') merBtn.style.display = '';

      } catch (fel) {
        svarEl.innerHTML = `<span style="color:#e07070">⚠️ ${fel.message || String(fel)}</span>`;
      }
    }

Lista 2–3 viner ur källaren som passar rätten, rangordnade från bäst till sämst match. För varje vin:
1. **[Vinnamn] [årgång]** · [hyllplats] · [antal] fl · [pris] kr
   [En mening: varför det passar + priskommentar anpassad till tonläget (t.ex. "en prisvärd vardagsflaska" eller "värt att öppna för tillfällets skull").]
Om källaren inte räcker till en rätt: avsluta med "(Om inget passar: köp [konkret förslag med druva, region, ~pris på Systembolaget].)"

    }

    /* ── Anropa Claude API ── */
    async function anropaClaude(prompt) {
      let apiNyckel = localStorage.getItem('frysregister_apikey_v1') || '';
      if (!apiNyckel) {
        apiNyckel = (window.prompt('Klistra in din Anthropic API-nyckel:') || '').trim();
        if (!apiNyckel) throw new Error('Ingen API-nyckel angiven.');
        localStorage.setItem('frysregister_apikey_v1', apiNyckel);
      }

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiNyckel,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 16000,
          tools: [{ type: 'web_search_20260209', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) {
        const felText = await resp.text();
        if (resp.status === 401) localStorage.removeItem('frysregister_apikey_v1');
        throw new Error(`API-fel ${resp.status}: ${felText.slice(0, 200)}`);
      }

      const svar = await resp.json();

      /* Hantera pause_turn (web_search kan pausa internt) */
      if (svar.stop_reason === 'pause_turn') {
        const block = (svar.content || []).find(b => b.type === 'text');
        if (block && block.text) return block.text;
        throw new Error('Svaret pausades av API:et – försök igen.');
      }

      const block = (svar.content || []).find(b => b.type === 'text');
      if (!block || !block.text) throw new Error('Tomt svar från Claude – inga textblock i svaret.');
      /* Rensa ev. ```-staket som Claude ibland lägger till runt svaret */
      return block.text.replace(/^```[^\n]*\n?/, '').replace(/\n?```$/, '').trim();
    }

    /* ── Planera middag ── */
    async function planeraMiddag(alternativt) {
      if (startVal === 'ravara' && !valdRavara) {
        visaFel('Välj en råvara från frysen, eller byt till "Överraska mig".');
        return;
      }
      if (startVal === 'vin' && !valdVin) {
        visaFel('Välj ett vin från vinkällaren, eller byt till "Överraska mig".');
        return;
      }

      visaLaddning(true);

      try {
        const prompt = byggPrompt(alternativt || false);

        const rattOrdning = ['forratt', 'varmratt', 'efterratt'];
        const rattText = rattOrdning.filter(r => valtaRatter.has(r)).map(r => RATT_LABEL[r]).join(' + ');
        let metaText = `${rattText} · ${TON_LABEL[tonlage]} · ${antal} pers`;
        if (startVal === 'ravara' && valdRavara) metaText += ` · 🥩 ${valdRavara.namn}`;
        if (startVal === 'vin'    && valdVin)    metaText += ` · 🍷 ${valdVin.namn || 'valt vin'}`;

        const text = await anropaClaude(prompt);
        senastSvar = text;

        const utanInkop = text.replace(/##\s*(?:Inköpslista|Inkopslista)[\s\S]*$/i, '').trim();
        document.getElementById('resultat-innehall').innerHTML = renderMarkdown(utanInkop);
        injicerapViskning();

        const inkopRader = extraherapInkoplista(text);
        const inkopSekt  = document.getElementById('inkop-sektion');
        if (inkopRader && inkopRader.length) {
          document.getElementById('inkop-lista').innerHTML =
            inkopRader.map(r => `<div>• ${formatInline(r)}</div>`).join('');
          inkopSekt.classList.add('synlig');
        } else {
          inkopSekt.classList.remove('synlig');
        }

        document.getElementById('resultat-meta').textContent = metaText;
        visaLaddning(false);
        document.getElementById('resultat-sektion').classList.add('synlig');
        document.getElementById('resultat-sektion').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (fel) {
        visaLaddning(false);
        visaFel(fel.message || String(fel));
      }
    }

    /* ── Knappar ── */
    document.getElementById('planera-btn').addEventListener('click', () => planeraMiddag(false));
    document.getElementById('nytt-btn').addEventListener('click',    () => planeraMiddag(true));

    document.getElementById('spara-btn').addEventListener('click', () => {
      if (!senastSvar) return;
      const rattOrdning = ['forratt', 'varmratt', 'efterratt'];
      const rattText = rattOrdning.filter(r => valtaRatter.has(r)).map(r => RATT_LABEL[r]).join(' + ');
      const recept = {
        id: Date.now(),
        datum: new Date().toISOString().slice(0, 10),
        rattText, tonlage, antal, startVal,
        valdRavaranamn: valdRavara ? valdRavara.namn : null,
        valdVinnamn:    valdVin    ? (valdVin.namn || null) : null,
        text: senastSvar
      };
      try {
        const bank = JSON.parse(localStorage.getItem('receptbank_v1') || '[]');
        bank.unshift(recept);
        localStorage.setItem('receptbank_v1', JSON.stringify(bank));
        const btn = document.getElementById('spara-btn');
        const orig = btn.textContent;
        btn.textContent = '✓ Sparat!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      } catch (e) {
        visaFel('Kunde inte spara i receptbanken: ' + e.message);
      }
    });

    document.getElementById('kopiera-btn').addEventListener('click', () => {
      const lista = document.getElementById('inkop-lista');
      const text  = Array.from(lista.querySelectorAll('div'))
        .map(d => d.textContent.replace(/^•\s*/, '- '))
        .join('\n');

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('kopiera-btn');
        btn.textContent = '✓ Kopierat!';
        btn.classList.add('kopierat');
        setTimeout(() => { btn.textContent = '📋 Kopiera'; btn.classList.remove('kopierat'); }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    });

    /* ── Init ── */
    initKoksan();
  </script>
