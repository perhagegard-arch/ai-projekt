<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pers Kök & Vinkällare</title>
  <style>
    /* Basinställningar – mörkt tema per CLAUDE.md */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    /* Emblem och rubrik */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .emblem {
      width: 330px;
      height: 330px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 1.25rem;
    }

    .emblem-fallback {
      font-size: 4.5rem;
      line-height: 1;
      margin-bottom: 0.75rem;
      display: none;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #f5ede0;
    }

    .valkomst-underrubrik {
      font-size: 0.95rem;
      color: #a07830;
      margin-top: 0.4rem;
      letter-spacing: 0.03em;
    }

    .fotnot {
      margin-top: 2.25rem;
      font-size: 0.78rem;
      color: #3a3020;
      letter-spacing: 0.05em;
    }

    /* Överblicksrad */
    .overblick {
      display: flex;
      gap: 0;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
      max-width: 620px;
    }

    .overblick-post {
      flex: 1;
      min-width: 140px;
      text-align: center;
      padding: 0.9rem 1rem;
      border-right: 1px solid #2a2a2a;
      font-size: 0.8rem;
      color: #777;
    }

    .overblick-post:last-child { border-right: none; }

    .overblick-post .siffra {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 0.15rem;
      letter-spacing: -0.01em;
    }

    /* Ingångskort – hierarki: Köket dominerar, Frysen + Vinkällaren under */
    .ingångar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 700px;
    }

    .kort {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 120px;
      padding: 1.5rem 1rem;
      border-radius: 18px;
      text-decoration: none;
      color: #e0e0e0;
      border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .kort:active { transform: scale(0.96); }

    /* Hover bara på enheter med pekare (ej touch) */
    @media (hover: hover) {
      .kort:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
    }

    .kort-ikon { font-size: 2.5rem; line-height: 1; }
    .kort-namn  { font-size: 1rem; font-weight: 700; }

    .kort-tagline {
      font-size: 0.88rem;
      color: #a07830;
      font-weight: 400;
    }

    /* Frysen – is-blå accent */
    .kort-frys {
      background: linear-gradient(145deg, #0d2a35, #0a1e27);
      border-color: #1a5f7a;
    }

    /* Vinkällaren – vinröd accent */
    .kort-vin {
      background: linear-gradient(145deg, #2a0d14, #1e0a0f);
      border-color: #7a1a2a;
    }

    /* Köket – guld, full bredd, dominant */
    .kort-kok {
      grid-column: 1 / -1;
      min-height: 190px;
      padding: 2rem 1.5rem;
      background: linear-gradient(145deg, #2c2008, #1c1506);
      border-color: #9a7a20;
    }

    .kort-kok .kort-ikon { font-size: 3.5rem; }
    .kort-kok .kort-namn  { font-size: 1.45rem; color: #f0e0b0; }

    /* Mobil (<500px): allt i en kolumn, horisontell kortlayout */
    @media (max-width: 500px) {
      .ingångar {
        grid-template-columns: 1fr;
        max-width: 420px;
      }

      .kort-kok { grid-column: auto; }

      .kort {
        flex-direction: row;
        justify-content: flex-start;
        min-height: 90px;
        padding: 1.25rem 1.5rem;
        gap: 1.25rem;
      }

      .kort-kok { min-height: 110px; }

      .kort-text { text-align: left; }
    }
  </style>
</head>
<body>

  <header>
    <img
      src="Logga.png"
      alt="Pers Kök & Vinkällare"
      class="emblem"
      onerror="this.style.display='none'; document.getElementById('emblem-fb').style.display='block';"
    >
    <div id="emblem-fb" class="emblem-fallback">👨‍🍳</div>
    <h1>Välkommen hem</h1>
    <p class="valkomst-underrubrik">Vad vill du laga idag?</p>
  </header>

  <!-- Överblick – data läses live från localStorage -->
  <div class="overblick" role="status" aria-label="Snabköversikt">
    <div class="overblick-post">
      <span class="siffra" id="frys-antal">—</span>
      förp i frysen
    </div>
    <div class="overblick-post">
      <span class="siffra" id="vin-antal">—</span>
      flaskor i källaren
    </div>
    <div class="overblick-post">
      <span class="siffra" id="sv-antal">—</span>
      sous vide-körningar
    </div>
  </div>

  <nav class="ingångar" aria-label="Plattformens delar">

    <!-- Köket: full bredd, visas överst -->
    <a href="kok.html" class="kort kort-kok">
      <span class="kort-ikon">🍽️</span>
      <div class="kort-text">
        <div class="kort-namn">Laga mat</div>
        <div class="kort-tagline">Vad blir det idag?</div>
      </div>
    </a>

    <!-- Frysen och Vinkällaren: sida vid sida under Köket -->
    <a href="https://perhagegard-arch.github.io/frysregister/" class="kort kort-frys">
      <span class="kort-ikon">🧊</span>
      <div class="kort-text">
        <div class="kort-namn">Frysen</div>
      </div>
    </a>

    <a href="vinkallare.html" class="kort kort-vin">
      <span class="kort-ikon">🍷</span>
      <div class="kort-text">
        <div class="kort-namn">Vinkällaren</div>
      </div>
    </a>

  </nav>

  <p class="fotnot">God aptit, Per</p>

  <script>
    // Läs data från localStorage – fungerar bara på publicerad GitHub Pages (samma origin).
    // Lokal fil (file://) ger SecurityError eller tomt svar – visa streck som fallback.
    (function () {
      if (window.location.protocol === 'file:') return;

      try {
        var raw = localStorage.getItem('frysregister_v1');
        if (raw) {
          var varor = JSON.parse(raw);
          var totalAntal = varor.reduce(function (sum, v) {
            return sum + (Number(v.qty) || 0);
          }, 0);
          document.getElementById('frys-antal').textContent = totalAntal;
        }
      } catch (e) { /* behåll streck */ }

      try {
        var vinRaw = localStorage.getItem('vinkallare_viner');
        if (vinRaw) {
          var viner = JSON.parse(vinRaw);
          var totalFlaskor = viner.reduce(function (s, v) { return s + (Number(v.antal) || 0); }, 0);
          document.getElementById('vin-antal').textContent = totalFlaskor;
        }
      } catch (e) { /* behåll streck */ }

      try {
        var svRaw = localStorage.getItem('sousvide_koningar');
        if (svRaw) {
          var koningar = JSON.parse(svRaw);
          document.getElementById('sv-antal').textContent = koningar.length;
        }
      } catch (e) { /* behåll streck */ }
    }());
  </script>

</body>
</html>
